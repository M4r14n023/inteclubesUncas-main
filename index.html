    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2416 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2416 100%);
            color: #d4af37;
            padding: 20px 30px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        .header img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            color: #d4af37;
        }

        .header p {
            color: #c5a572;
        }

        .login-container {
            background: white;
            max-width: 500px;
            margin: 100px auto;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
        }

        .role-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            border: 2px solid #ddd;
            background: #f8f9fa;
            color: #1e3c72;
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-btn:hover {
            border-color: #d4af37;
            background: #fffbef;
            transform: translateY(-2px);
        }

        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #ddd;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .tabs::-webkit-scrollbar { height: 4px; }
        .tabs::-webkit-scrollbar-thumb { background: #c5a572; border-radius: 4px; }

        .tab {
            flex: 1 0 auto; 
            min-width: 130px; 
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #e0e0e0;
            border: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab:hover { background: #d0d0d0; }
        .tab.active { background: white; border-bottom: 3px solid #d4af37; }
        .tab.admin-tab { background: #1e293b; color: white; border-bottom: none; }
        .tab.admin-tab.active { background: #0f172a; border-bottom: 3px solid #ef4444; }

        .content { padding: 30px; min-height: 500px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input[type="text"], input[type="password"], input[type="number"], textarea, select {
            width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; transition: border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #667eea; }
        input:disabled, select:disabled { background: #f1f5f9; cursor: not-allowed; }

        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-right: 10px; }
        .btn-primary { background: #d4af37; color: #1a1a1a; font-weight: 700; }
        .btn-primary:hover { background: #c5a03d; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .team-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .team-card { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid #667eea; font-weight: bold; }
        .team-card.goat { border-left-color: #10b981; background: #ecfdf5; }

        .match-grid { display: grid; gap: 15px; margin-top: 20px; }
        .match-card { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 2px solid #ddd; }
        .match-card.bonus { border-color: #f59e0b; background: #fffbeb; }
        .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .match-type { font-weight: 700; color: #1e3c72; font-size: 16px; }
        .match-time { background: #667eea; color: white; padding: 5px 12px; border-radius: 6px; font-size: 14px; }
        .checkbox-container { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        input[type="checkbox"] { width: 24px; height: 24px; cursor: pointer; }
        input[type="checkbox"]:disabled { cursor: not-allowed; opacity: 0.5; }

        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-radius: 8px; }
        .stats-table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .stats-table th, .stats-table td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .stats-table th { background: #f5f5f5; font-weight: 700; color: #1e3c72; }
        .stats-table tr:hover { background: #f9fafb; }

        .warning { background: #fef3c7; border: 2px solid #f59e0b; padding: 15px; border-radius: 8px; margin: 15px 0; color: #92400e; font-weight: 600; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 10px; }
        .modal-content { background: white; padding: 30px; border-radius: 16px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 24px; font-weight: 700; margin-bottom: 20px; color: #1e3c72; }

        .date-section { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; transition: all 0.3s ease; }
        .date-header { font-size: 20px; font-weight: 700; color: #1e3c72; margin-bottom: 15px; }

        .player-count-warning { color: #dc2626; font-size: 12px; margin-top: 5px; }
        .success-message { background: #d1fae5; border: 2px solid #10b981; padding: 15px; border-radius: 8px; margin: 15px 0; color: #065f46; font-weight: 600; }
        .captain-badge { background: #f59e0b; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 8px; }

        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .grid-2 > div { min-width: 0; }

        .user-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { flex-direction: column; padding: 15px; padding-top: 70px; }
            .header h1 { font-size: 2em; text-align: center; }
            .user-menu { top: 10px; right: 10px; padding: 5px 10px; }
            .content { padding: 15px; }
            .grid-2 { grid-template-columns: 1fr; gap: 15px; }
            .flex-mobile-col { flex-direction: column !important; align-items: stretch !important; }
            .btn-responsive { width: 100%; margin-bottom: 10px; margin-right: 0 !important; }
            .match-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .modal-content { padding: 20px; }
            .team-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuración de Firebase - Hub Universitario
        const firebaseConfig = {
            apiKey: "AIzaSyDWut5pII90tdvaB_AwkvdQ6Oq3TgM5wKY",
            authDomain: "hub-universitario.firebaseapp.com",
            databaseURL: "https://hub-universitario-default-rtdb.firebaseio.com",
            projectId: "hub-universitario",
            storageBucket: "hub-universitario.firebasestorage.app",
            messagingSenderId: "642915679228",
            appId: "1:642915679228:web:e6e48b25869d74c14cfe87"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        // ============================================================
        //  ⚙️  CONFIGURACIÓN DE PLANTILLA — ÚNICO VALOR A CAMBIAR
        //  Reemplazá 'nombre_del_equipo' con el ID único de tu equipo.
        //  Ejemplo: 'club_atletico_norte', 'tenis_del_sur_2025', etc.
        //  Este valor define el nodo aislado en Firebase para tus datos.
        // ============================================================
        const ID_PROYECTO = 'nuevo equipo';
        // ============================================================

        const database = firebase.database();
        const FIREBASE_PATH = `torneos/${ID_PROYECTO}`;

        const guardarEnFirebase = async (datos) => {
            const syncTime = new Date().toISOString();
            await database.ref(`${FIREBASE_PATH}/datos`).set({ ...datos, ultimaActualizacion: syncTime });
            return syncTime;
        };

        const cargarDesdeFirebase = () => {
            return database.ref(`${FIREBASE_PATH}/datos`).once('value').then(snapshot => snapshot.val());
        };

        const escucharCambiosFirebase = (callback) => {
            const ref = database.ref(`${FIREBASE_PATH}/datos`);
            ref.on('value', (snapshot) => {
                const datos = snapshot.val();
                if (datos) callback(datos);
            });
            return () => ref.off('value');
        };

        // Funciones para leer/escribir configuración del equipo
        const guardarConfigFirebase = async (config) => {
            await database.ref(`${FIREBASE_PATH}/config`).set(config);
        };

        const cargarConfigFirebase = () => {
            return database.ref(`${FIREBASE_PATH}/config`).once('value').then(snapshot => snapshot.val());
        };

        const PARTIDOS = [
            { id: 9, tipo: "Dobles Damas A/B", categorias: ["damas_a", "damas_b"], numJugadores: 2, grupo: "damas" },
            { id: 21, tipo: "Dobles Damas A", categorias: ["damas_a"], numJugadores: 2, grupo: "damas" },
            { id: 16, tipo: "Dobles Damas B", categorias: ["damas_b"], numJugadores: 2, grupo: "damas" },
            { id: 26, tipo: "Dobles Damas B/C", categorias: ["damas_b", "damas_c"], numJugadores: 2, grupo: "damas" },
            { id: 1, tipo: "Dobles Damas C-1", categorias: ["damas_c"], numJugadores: 2, grupo: "damas" },
            { id: 22, tipo: "Dobles Damas C-2", categorias: ["damas_c"], numJugadores: 2, grupo: "damas" },
            { id: 4, tipo: "Mixto D (Dama A + Caballero 2da)", categorias: ["damas_a", "caballeros_2da"], numJugadores: 2, mixto: true, grupo: "mixtos" },
            { id: 14, tipo: "Mixto A (Dama A + Caballero 3ra)", categorias: ["damas_a", "caballeros_3ra"], numJugadores: 2, mixto: true, grupo: "mixtos" },
            { id: 19, tipo: "Mixto B (Dama B + Caballero 4ta)", categorias: ["damas_b", "caballeros_4ta"], numJugadores: 2, mixto: true, grupo: "mixtos" },
            { id: 11, tipo: "Mixto E (Dama B + Caballero 5ta)", categorias: ["damas_b", "caballeros_5ta"], numJugadores: 2, mixto: true, grupo: "mixtos" },
            { id: 8, tipo: "Mixto C (Dama C + Caballero 5ta)", categorias: ["damas_c", "caballeros_5ta"], numJugadores: 2, mixto: true, grupo: "mixtos" },
            { id: 20, tipo: "Single Caballero 2da", categorias: ["caballeros_2da"], numJugadores: 1, grupo: "singles" },
            { id: 10, tipo: "Single Caballero 3ra", categorias: ["caballeros_3ra"], numJugadores: 1, grupo: "singles" },
            { id: 6, tipo: "Single Caballero 4ta", categorias: ["caballeros_4ta"], numJugadores: 1, grupo: "singles" },
            { id: 24, tipo: "Single Caballero 5ta", categorias: ["caballeros_5ta"], numJugadores: 1, grupo: "singles" },
            { id: 7, tipo: "Dobles Caballeros 2da/2da", categorias: ["caballeros_2da"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 15, tipo: "Dobles Caballeros 2da", categorias: ["caballeros_2da"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 5, tipo: "Dobles Caballeros 3ra/3ra", categorias: ["caballeros_3ra"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 18, tipo: "Dobles Caballeros 3ra", categorias: ["caballeros_3ra"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 12, tipo: "Dobles Caballeros 4ta/4ta", categorias: ["caballeros_4ta"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 23, tipo: "Dobles Caballeros 4ta", categorias: ["caballeros_4ta"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 3, tipo: "Dobles Caballeros 5ta/5ta", categorias: ["caballeros_5ta"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 13, tipo: "Dobles Caballeros 5ta", categorias: ["caballeros_5ta"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 25, tipo: "Dobles Caballeros 2da/3ra", categorias: ["caballeros_2da", "caballeros_3ra"], numJugadores: 2, grupo: "dobles_combinados" },
            { id: 2, tipo: "Dobles Caballeros 3ra/4ta", categorias: ["caballeros_3ra", "caballeros_4ta"], numJugadores: 2, grupo: "dobles_combinados" },
            { id: 17, tipo: "Dobles Caballeros 4ta/5ta", categorias: ["caballeros_4ta", "caballeros_5ta"], numJugadores: 2, grupo: "dobles_combinados" }
        ];

        // Plantel cargado dinámicamente desde Firebase config.plantel — no hay datos hardcodeados

        const EQUIPOS_POR_DEFECTO = [ 'Uncas', 'El Rojo', 'Ferro', 'Tercer Tiempo', 'Tres Arroyos', 'Head', 'La Cardoneta', 'La Sede', 'Tiro Federal' ];

        const CATEGORIAS_DISPONIBLES = [
            { value: 'caballeros_2da', label: 'Caballeros 2da', max: 5 },
            { value: 'caballeros_3ra', label: 'Caballeros 3ra', max: 5 },
            { value: 'caballeros_4ta', label: 'Caballeros 4ta', max: 5 },
            { value: 'caballeros_5ta', label: 'Caballeros 5ta', max: 5 },
            { value: 'damas_a',        label: 'Damas A',        max: 3 },
            { value: 'damas_b',        label: 'Damas B',        max: 4 },
            { value: 'damas_c',        label: 'Damas C',        max: 4 },
        ];
        const MAX_POR_CATEGORIA = Object.fromEntries(CATEGORIAS_DISPONIBLES.map(c => [c.value, c.max]));

        // ============================================================
        //  🧙 SETUP WIZARD — Se muestra cuando el equipo es nuevo
        // ============================================================
        function SetupWizard({ onSetupComplete }) {
            const [paso, setPaso] = useState(1);
            const [guardando, setGuardando] = useState(false);
            const [error, setError] = useState('');

            // Paso 1: Info del equipo
            const [nombreEquipo, setNombreEquipo] = useState('');
            const [descripcion, setDescripcion] = useState('');

            // Paso 2: PINs
            const [pinCapitan, setPinCapitan] = useState('');
            const [pinCapitanConf, setPinCapitanConf] = useState('');
            const [pinAdmin, setPinAdmin] = useState('');
            const [pinAdminConf, setPinAdminConf] = useState('');

            // Paso 3: Plantel — gestionado con ModalCargaPlantel
            const [plantelWizard, setPlantelWizard] = useState({});
            const [showPlantelModal, setShowPlantelModal] = useState(false);

            const validarPaso1 = () => {
                if (!nombreEquipo.trim()) { setError('El nombre del equipo es obligatorio.'); return false; }
                setError(''); return true;
            };
            const validarPaso2 = () => {
                if (pinCapitan.length < 4) { setError('El PIN de Capitán debe tener al menos 4 dígitos.'); return false; }
                if (pinCapitan !== pinCapitanConf) { setError('Los PINs de Capitán no coinciden.'); return false; }
                if (pinAdmin.length < 4) { setError('El PIN de Admin debe tener al menos 4 dígitos.'); return false; }
                if (pinAdmin !== pinAdminConf) { setError('Los PINs de Admin no coinciden.'); return false; }
                if (pinCapitan === pinAdmin) { setError('El PIN de Capitán y de Admin deben ser distintos.'); return false; }
                setError(''); return true;
            };
            const validarPaso3 = () => {
                const total = Object.values(plantelWizard).flat().length;
                if (total === 0) { setError('Agregá al menos un jugador al plantel.'); return false; }
                setError(''); return true;
            };

            const avanzar = () => {
                const validadores = { 1: validarPaso1, 2: validarPaso2, 3: validarPaso3 };
                if (validadores[paso]()) setPaso(p => p + 1);
            };

            const guardarConfig = async () => {
                if (!validarPaso3()) return;
                setGuardando(true);
                setError('');
                try {
                    const config = {
                        nombreEquipo: nombreEquipo.trim(),
                        descripcion: descripcion.trim(),
                        pinCapitan,
                        pinAdmin,
                        plantel: plantelWizard,
                        setupCompletado: true,
                        fechaCreacion: new Date().toISOString(),
                    };
                    await guardarConfigFirebase(config);
                    onSetupComplete(config);
                } catch (e) {
                    setError('Error al guardar en Firebase. Verificá tu conexión e ID_PROYECTO.');
                } finally {
                    setGuardando(false);
                }
            };

            const TOTAL_PASOS = 3;
            const progreso = Math.round(((paso - 1) / TOTAL_PASOS) * 100);
            const totalJugadoresWizard = Object.values(plantelWizard).flat().length;

            return (
                <div style={{
                    minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
                    background: 'linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)',
                    padding: '20px', fontFamily: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"
                }}>
                    <div style={{
                        background: 'white', borderRadius: '20px', padding: '40px',
                        maxWidth: '620px', width: '100%',
                        boxShadow: '0 30px 80px rgba(0,0,0,0.5)'
                    }}>
                        {/* Encabezado */}
                        <div style={{ textAlign: 'center', marginBottom: '32px' }}>
                            <div style={{ fontSize: '48px', marginBottom: '12px' }}>🎾</div>
                            <h1 style={{ color: '#0f2027', fontSize: '26px', margin: 0, fontWeight: 800 }}>
                                Configuración Inicial
                            </h1>
                            <p style={{ color: '#64748b', marginTop: '8px', fontSize: '14px' }}>
                                ID de proyecto: <code style={{background:'#f1f5f9', padding:'2px 8px', borderRadius:'4px', fontWeight:'700', color:'#203a43'}}>{ID_PROYECTO}</code>
                            </p>
                        </div>

                        {/* Barra de progreso */}
                        <div style={{ marginBottom: '32px' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '6px' }}>
                                {['Equipo', 'PINs de Acceso', 'Plantel Inicial'].map((label, i) => (
                                    <span key={i} style={{
                                        fontSize: '12px', fontWeight: '600',
                                        color: paso > i ? '#10b981' : paso === i + 1 ? '#203a43' : '#94a3b8'
                                    }}>
                                        {paso > i + 1 ? '✅' : paso === i + 1 ? '▶' : '○'} {label}
                                    </span>
                                ))}
                            </div>
                            <div style={{ height: '6px', background: '#e2e8f0', borderRadius: '3px', overflow: 'hidden' }}>
                                <div style={{
                                    height: '100%', borderRadius: '3px',
                                    background: 'linear-gradient(90deg, #10b981, #059669)',
                                    width: `${progreso}%`, transition: 'width 0.4s ease'
                                }} />
                            </div>
                        </div>

                        {/* ── PASO 1: Nombre del equipo ── */}
                        {paso === 1 && (
                            <div>
                                <h2 style={{color:'#203a43', marginBottom:'6px', fontSize:'20px'}}>Paso 1 — Tu Equipo</h2>
                                <p style={{color:'#64748b', fontSize:'14px', marginBottom:'24px'}}>
                                    Este nombre se utilizará en toda la aplicación.
                                </p>
                                <div className="form-group">
                                    <label>Nombre del Equipo Principal *</label>
                                    <input type="text" value={nombreEquipo} onChange={e => setNombreEquipo(e.target.value)}
                                        placeholder="Ej: Los Ases, Club Ferro, Thunder TC..." autoFocus
                                    />
                                </div>
                                <div className="form-group">

        function App() {
            const [userRole, setUserRole] = useState(localStorage.getItem(ID_PROYECTO + '_user_role') || null);
            const [activeTab, setActiveTab] = useState('busqueda');
            
            // Estado de configuración del equipo (cargada desde Firebase)
            const [config, setConfig] = useState(null);
            const [setupStatus, setSetupStatus] = useState('loading'); // 'loading' | 'needs_setup' | 'ready'
            
            const [numEquipos, setNumEquipos] = useState(10);
            const [equipos, setEquipos] = useState([]);
            const [baseEquipos, setBaseEquipos] = useState(EQUIPOS_POR_DEFECTO); 
            const [fechas, setFechas] = useState([]);
            const [posiciones, setPosiciones] = useState({});
            const [resultados, setResultados] = useState({});
            const [crucesFinales, setCrucesFinales] = useState([]);
            const [zonasConfig, setZonasConfig] = useState({ zona1: [], zona2: [] });
            const [playoffAvances, setPlayoffAvances] = useState({});
            const [syncStatus, setSyncStatus] = useState('local');
            const [lastSync, setLastSync] = useState(null);

            const isReceivingData = useRef(false);

            // Guardar rol en memoria
            useEffect(() => {
                if (userRole) localStorage.setItem(ID_PROYECTO + '_user_role', userRole);
                else localStorage.removeItem(ID_PROYECTO + '_user_role');
            }, [userRole]);

            // Cargar configuración del equipo desde Firebase al iniciar
            useEffect(() => {
                const verificarSetup = async () => {
                    try {
                        // Primero revisar caché local para mostrar app rápido
                        const configLocal = localStorage.getItem(`${ID_PROYECTO}_config`);
                        if (configLocal) {
                            const c = JSON.parse(configLocal);
                            setConfig(c);
                            setSetupStatus('ready');
                        }
                        // Luego verificar Firebase (fuente de verdad)
                        const configFirebase = await cargarConfigFirebase();
                        if (configFirebase && configFirebase.setupCompletado) {
                            setConfig(configFirebase);
                            setSetupStatus('ready');
                            localStorage.setItem(`${ID_PROYECTO}_config`, JSON.stringify(configFirebase));
                        } else if (!configLocal) {
                            // No hay config en Firebase ni en local → nuevo equipo
                            setSetupStatus('needs_setup');
                        }
                    } catch (e) {
                        console.error('Error al verificar setup:', e);
                        // Si hay caché local usarla de fallback
                        const configLocal = localStorage.getItem(`${ID_PROYECTO}_config`);
                        if (configLocal) {
                            setConfig(JSON.parse(configLocal));
                            setSetupStatus('ready');
                        } else {
                            setSetupStatus('needs_setup');
                        }
                    }
                };
                verificarSetup();
            }, []);

            useEffect(() => {
                const cargarDatos = async () => {
                    const datosGuardados = localStorage.getItem(ID_PROYECTO + '_datos');
                    if (datosGuardados) {
                        try {
                            const datos = JSON.parse(datosGuardados);
                            setNumEquipos(datos.numEquipos || 10); setEquipos(datos.equipos || []); setBaseEquipos(datos.baseEquipos || EQUIPOS_POR_DEFECTO); setFechas(datos.fechas || []); setResultados(datos.resultados || {}); setPosiciones(datos.posiciones || {}); setCrucesFinales(datos.crucesFinales || []); setZonasConfig({ zona1: (datos.zonasConfig?.zona1 || []), zona2: (datos.zonasConfig?.zona2 || []) }); setPlayoffAvances(datos.playoffAvances || {});
                        } catch (e) { console.error('Error al cargar datos:', e); }
                    }

                    try {
                        setSyncStatus('syncing');
                        const datosFirebase = await cargarDesdeFirebase();
                        if (datosFirebase) {
                            isReceivingData.current = true;
                            setNumEquipos(datosFirebase.numEquipos || 10); setEquipos(datosFirebase.equipos || []); setBaseEquipos(datosFirebase.baseEquipos || EQUIPOS_POR_DEFECTO); setFechas(datosFirebase.fechas || []); setResultados(datosFirebase.resultados || {}); setPosiciones(datosFirebase.posiciones || {}); setCrucesFinales(datosFirebase.crucesFinales || []); setZonasConfig({ zona1: (datosFirebase.zonasConfig?.zona1 || []), zona2: (datosFirebase.zonasConfig?.zona2 || []) }); setPlayoffAvances(datosFirebase.playoffAvances || {});
                            setLastSync(datosFirebase.ultimaActualizacion); setSyncStatus('synced');
                            localStorage.setItem(ID_PROYECTO + '_datos', JSON.stringify(datosFirebase));
                            setTimeout(() => { isReceivingData.current = false; }, 1000);
                        } else { setSyncStatus('local'); }
                    } catch (e) { setSyncStatus('local'); }
                };

                cargarDatos();

                const unsubscribe = escucharCambiosFirebase((datos) => {
                    if (datos && datos.ultimaActualizacion !== lastSync) {
                        isReceivingData.current = true;
                        setNumEquipos(datos.numEquipos || 10); setEquipos(datos.equipos || []); setBaseEquipos(datos.baseEquipos || EQUIPOS_POR_DEFECTO); setFechas(datos.fechas || []); setResultados(datos.resultados || {}); setPosiciones(datos.posiciones || {}); setCrucesFinales(datos.crucesFinales || []); setZonasConfig({ zona1: (datos.zonasConfig?.zona1 || []), zona2: (datos.zonasConfig?.zona2 || []) }); setPlayoffAvances(datos.playoffAvances || {});
                        setLastSync(datos.ultimaActualizacion); setSyncStatus('synced');
                        localStorage.setItem(ID_PROYECTO + '_datos', JSON.stringify(datos));
                        setTimeout(() => { isReceivingData.current = false; }, 1000);
                    }
                });

                return () => { if (unsubscribe) unsubscribe(); };
            }, []);

            useEffect(() => {
                if (isReceivingData.current) return;
                const datos = { numEquipos, equipos, baseEquipos, fechas, resultados, posiciones, crucesFinales, zonasConfig, playoffAvances };
                localStorage.setItem(ID_PROYECTO + '_datos', JSON.stringify(datos));
                
                // Solo admin y capitán suben datos. Jugador no guarda en nube (protección extra)
                if (userRole !== 'jugador' && (equipos.length > 0 || fechas.length > 0)) {
                    setSyncStatus('syncing');
                    guardarEnFirebase(datos)
                        .then((tiempoExacto) => { setSyncStatus('synced'); setLastSync(tiempoExacto); })
                        .catch((error) => { console.error('Error al sincronizar:', error); setSyncStatus('error'); });
                }
            }, [numEquipos, equipos, baseEquipos, fechas, resultados, posiciones, crucesFinales, zonasConfig, playoffAvances, userRole]);

            const logout = () => {
                setUserRole(null);
                setActiveTab('busqueda');
            };

            // ── PANTALLA DE CARGA ──
            if (setupStatus === 'loading') {
                return (
                    <div style={{
                        minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center',
                        justifyContent:'center', background:'linear-gradient(135deg, #0f2027 0%, #203a43 100%)'
                    }}>
                        <div style={{fontSize:'48px', marginBottom:'16px'}}>🎾</div>
                        <p style={{color:'#c5a572', fontSize:'18px', fontWeight:'600'}}>Cargando...</p>
                        <p style={{color:'#64748b', fontSize:'13px', marginTop:'8px'}}>
                            Verificando configuración para <strong style={{color:'#94a3b8'}}>{ID_PROYECTO}</strong>
                        </p>
                    </div>
                );
            }

            // ── SETUP WIZARD (equipo nuevo) ──
            if (setupStatus === 'needs_setup') {
                return (
                    <SetupWizard onSetupComplete={(nuevaConfig) => {
                        setConfig(nuevaConfig);
                        setSetupStatus('ready');
                        localStorage.setItem(`${ID_PROYECTO}_config`, JSON.stringify(nuevaConfig));
                    }} />
                );
            }

            // ── LOGIN (equipo configurado, sin rol seleccionado) ──
            if (!userRole) {
                return <LoginScreen onLogin={setUserRole} config={config} />;
            }

            const guardarEquiposSeleccionados = (nombresRivales) => {
                const miEquipoNombre = config ? config.nombreEquipo : 'Mi Equipo';
                const nuevosEquipos = nombresRivales.map(nombre => ({ nombre: nombre, esGoat: false }));
                const todosEquipos = [{ nombre: miEquipoNombre, esGoat: true }, ...nuevosEquipos];
                setEquipos(todosEquipos);
            };

            const agregarFecha = (numFecha, rival) => {
    setFechas(prevFechas => {
        // 1. Convertimos a array por seguridad, por si Firebase ya lo rompió
        const arrSeguro = Array.isArray(prevFechas) ? prevFechas : Object.values(prevFechas || {});
        const nuevasFechas = [...arrSeguro];
        
        // 2. Armamos la estructura de la fecha
        const nuevaFecha = { 
            numero: numFecha, 
            rival: rival, 
            partidos: PARTIDOS.map(p => ({ ...p, jugadores: [], horario: '', dia: 'sabado', ganado: false })), 
            partidoBonus: null, 
            categoriasHabilitadas: { caballeros_5ta_en_4ta: false, caballeros_4ta_en_3ra: false, caballeros_3ra_en_2da: false, damas_c_en_b: false, damas_b_en_a: false }, 
            jugadoresHabilitados: [],
            convocada: false // <--- NUEVO ESTADO DE PUBLICACIÓN 
        };
        
        nuevasFechas[numFecha - 1] = nuevaFecha;
        
        // 3. Rellenamos con 'null' los espacios vacíos para que Firebase NO lo transforme en un objeto
        for (let i = 0; i < nuevasFechas.length; i++) {
            if (nuevasFechas[i] === undefined) nuevasFechas[i] = null;
        }
        
        return nuevasFechas;
    });
};

            const procesarHorarios = (fechaIndex, texto) => {
                const lineas = texto.split('\n').filter(l => l.trim());
                const fechaActual = {...fechas[fechaIndex]};
                lineas.forEach(linea => {
                    const match = linea.match(/(\d+)\s*[-.:]\s*(.+)/);
                    if (match) {
                        const numPartido = parseInt(match[1]); const info = match[2].trim();
                        const horarioMatch = info.match(/(\d{1,2}):(\d{2})/); const diaMatch = info.toLowerCase().includes('dom') ? 'domingo' : 'sabado';
                        const partidoIndex = fechaActual.partidos.findIndex(p => p.id === numPartido);
                        if (partidoIndex !== -1) { fechaActual.partidos[partidoIndex].horario = horarioMatch ? `${horarioMatch[1]}:${horarioMatch[2]}` : ''; fechaActual.partidos[partidoIndex].dia = diaMatch; }
                    }
                });
                const nuevasFechas = [...fechas]; nuevasFechas[fechaIndex] = fechaActual; setFechas(nuevasFechas);
            };

            const actualizarJugadores = (fechaIndex, partidoId, jugadores) => {
                const nuevasFechas = [...fechas]; const partidoIndex = nuevasFechas[fechaIndex].partidos.findIndex(p => p.id === partidoId);
                if (partidoIndex !== -1) nuevasFechas[fechaIndex].partidos[partidoIndex].jugadores = jugadores;
                setFechas(nuevasFechas);
            };

            const contarPartidosJugador = (fechaIndex, nombreJugador) => {
                let count = 0;
                if (fechas[fechaIndex] && fechas[fechaIndex].partidos) {
                    fechas[fechaIndex].partidos.forEach(partido => { if (partido.jugadores && partido.jugadores.some(j => j === nombreJugador)) count++; });
                }
                return count;
            };

            const toggleResultado = (fechaIndex, partidoId) => {
                if (userRole === 'jugador') return; // Bloqueo de seguridad
                const key = `${fechaIndex}-${partidoId}`; setResultados(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const generarPDF = (fechaIndex) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const fecha = fechas[fechaIndex];
                if (!fecha) return;
                const miEquipoNombre = config ? config.nombreEquipo : 'Mi Equipo';

                doc.setFontSize(20); doc.text(`${miEquipoNombre} - Fecha ${fecha.numero}`, 105, 20, { align: 'center' });
                doc.setFontSize(14); doc.text(`vs ${fecha.rival}`, 105, 30, { align: 'center' });
                
                let y = 45;
                const partidosPorHorario = {};
                
                if (fecha.partidos) {
                    fecha.partidos.filter(p => p.horario).forEach(partido => {
                        const key = `${partido.dia}-${partido.horario}`;
                        if (!partidosPorHorario[key]) partidosPorHorario[key] = { dia: partido.dia, hora: partido.horario, partidos: [] };
                        partidosPorHorario[key].partidos.push(partido);
                    });
                }
                
                const horariosPorDia = { sabado: [], domingo: [] };
                Object.values(partidosPorHorario).forEach(horario => horariosPorDia[horario.dia].push(horario));
                horariosPorDia.sabado.sort((a, b) => a.hora.localeCompare(b.hora));
                horariosPorDia.domingo.sort((a, b) => a.hora.localeCompare(b.hora));
                
                ['sabado', 'domingo'].forEach(dia => {
                    if (horariosPorDia[dia].length > 0) {
                        if (y > 250) { doc.addPage(); y = 20; }
                        doc.setFontSize(14); doc.setFont(undefined, 'bold'); doc.text(dia.toUpperCase(), 20, y); y += 8;
                        doc.setFont(undefined, 'normal'); doc.setFontSize(10);
                        
                        horariosPorDia[dia].forEach(horario => {
                            horario.partidos.sort((a, b) => (a.posicion || 0) - (b.posicion || 0));
                            horario.partidos.forEach(partido => {
                                const esBonus = fecha.partidoBonus === partido.id;
                                const jugadoresTexto = (partido.jugadores && partido.jugadores.length > 0) ? partido.jugadores.join(' / ') : 'Sin asignar';
                                const texto = `${horario.hora} - P${partido.posicion} - ${partido.tipo}${esBonus ? ' ★BONUS★' : ''}: ${jugadoresTexto}`;
                                if (y > 275) { doc.addPage(); y = 20; }
                                if (esBonus) doc.setFont(undefined, 'bold');
                                doc.text(texto, 20, y);
                                if (esBonus) doc.setFont(undefined, 'normal');
                                y += 6;
                            });
                            y += 2;
                        });
                        y += 5;
                    }
                });
                
                const partidosPorJugador = {};
                if (fecha.partidos) {
                    fecha.partidos.forEach(partido => {
                        if (partido.horario && partido.jugadores) {
                            partido.jugadores.forEach(jugador => { partidosPorJugador[jugador] = (partidosPorJugador[jugador] || 0) + 1; });
                        }
                    });
                }
                
                if (Object.keys(partidosPorJugador).length > 0) {
                    if (y + (Object.keys(partidosPorJugador).length * 5) + 20 > 280) { doc.addPage(); y = 20; } else { y += 10; }
                    doc.setFontSize(12); doc.setFont(undefined, 'bold'); doc.text('RESUMEN DE CONVOCATORIA', 20, y); y += 8;
                    doc.setFont(undefined, 'normal'); doc.setFontSize(9);
                    
                    Object.entries(partidosPorJugador).sort((a, b) => b[1] - a[1]).forEach(([jugador, cantidad]) => {
                        const plantel = config?.plantel || {};
                        const jugadorObj = Object.values(plantel).flat().find(j => j.nombre === jugador);
                        const esCapitan = jugadorObj?.capitan ? ' (CAPITAN)' : '';
                        const advertencia = cantidad > 3 ? ' *** EXCEDE LIMITE ***' : '';
                        if (cantidad > 3) doc.setFont(undefined, 'bold');
                        doc.text(`${jugador}${esCapitan}: ${cantidad} partido${cantidad > 1 ? 's' : ''}${advertencia}`, 25, y);
                        if (cantidad > 3) doc.setFont(undefined, 'normal');
                        y += 5;
                    });
                }
                doc.save(`${miEquipoNombre}-Fecha${fecha.numero}-vs-${fecha.rival}.pdf`);
            };

            const calcularEstadisticas = () => {
                const stats = { jugadores: {}, parejas: {} };
                
                // Leemos el plantel dinámico de la nube (configApp.plantel)
                const todosJugadores = configApp?.plantel ? Object.values(configApp.plantel).flat() : [];
                
                todosJugadores.forEach(jugador => {
                    stats.jugadores[jugador.nombre] = { singles: { ganados: 0, perdidos: 0 }, dobles: { ganados: 0, perdidos: 0 }, total: { ganados: 0, perdidos: 0 } };
                });
                
                fechas.forEach((fecha, fechaIdx) => {
                    if (!fecha || !fecha.partidos) return;

                    // 🔒 NUEVO FILTRO DE SEGURIDAD: Si sos jugador y la fecha es borrador, no entra en estadísticas
                    if (userRole === 'jugador' && !fecha.convocada) return;

                    fecha.partidos.forEach(partido => {
                        if (partido.jugadores && partido.jugadores.length > 0) {
                            const key = `${fechaIdx}-${partido.id}`; const ganado = resultados[key] || false; const esSingle = partido.numJugadores === 1;
                            partido.jugadores.forEach(jugador => {
                                if (stats.jugadores[jugador]) {
                                    if (esSingle) stats.jugadores[jugador].singles[ganado ? 'ganados' : 'perdidos']++;
                                    else stats.jugadores[jugador].dobles[ganado ? 'ganados' : 'perdidos']++;
                                    stats.jugadores[jugador].total[ganado ? 'ganados' : 'perdidos']++;
                                }
                            });
                            if (!esSingle && partido.jugadores.length === 2) {
                                const parejaKey = [...partido.jugadores].sort().join(' - ');
                                if (!stats.parejas[parejaKey]) stats.parejas[parejaKey] = { ganados: 0, perdidos: 0, fechas: [] };
                                stats.parejas[parejaKey][ganado ? 'ganados' : 'perdidos']++;
                                stats.parejas[parejaKey].fechas.push({ fecha: fecha.numero, rival: fecha.rival, tipo: partido.tipo, resultado: ganado });
                            }
                        }
                    });
                });
                return stats;
            };

            return (
                <div className="container">
                    <div className="header">
                        <img src="icon-192.png" alt="Logo" />
                        <div className="header-text">
                            <h1>{config ? config.nombreEquipo : 'Mi Equipo'} - {config ? (config.descripcion || 'Interclubes') : 'Interclubes'}</h1>
                            <p>Sistema completo de seguimiento y armado de fechas</p>
                            
                            {userRole !== 'jugador' && (
                                <div style={{marginTop: '8px', display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px', color: '#c5a572'}}>
                                    {syncStatus === 'synced' && <><span style={{color: '#10b981'}}>●</span><span>Sincronizado con Nube</span></>}
                                    {syncStatus === 'syncing' && <><span style={{color: '#f59e0b'}}>●</span><span>Sincronizando...</span></>}
                                    {syncStatus === 'local' && <><span style={{color: '#6b7280'}}>●</span><span>Solo local</span></>}
                                    {syncStatus === 'error' && <><span style={{color: '#ef4444'}}>●</span><span>Error de sincronización</span></>}
                                </div>
                            )}
                        </div>
                        
                        <div className="user-menu">
                            <span style={{color: '#c5a572', fontSize: '14px', fontWeight: 'bold'}}>
                                {userRole === 'admin' ? '⚙️ Admin' : userRole === 'capitan' ? '⭐ Capitán' : '👤 Jugador'}
                            </span>
                            <button className="btn btn-danger" style={{padding: '5px 10px', fontSize: '12px', margin: 0}} onClick={logout}>Salir</button>
                        </div>
                    </div>

                    <div className="tabs">
                        <button className={`tab ${activeTab === 'busqueda' ? 'active' : ''}`} onClick={() => setActiveTab('busqueda')}>Mis Partidos 🔍</button>
                        <button className={`tab ${activeTab === 'resultados' ? 'active' : ''}`} onClick={() => setActiveTab('resultados')}>Resultados</button>
                        <button className={`tab ${activeTab === 'tablas' ? 'active' : ''}`} onClick={() => setActiveTab('tablas')}>Tablas</button>
                        <button className={`tab ${activeTab === 'estadisticas' ? 'active' : ''}`} onClick={() => setActiveTab('estadisticas')}>Estadísticas Grales.</button>
                        <button className={`tab ${activeTab === 'fechas' ? 'active' : ''}`} onClick={() => setActiveTab('fechas')}>Fechas</button>
                        <button className={`tab ${activeTab === 'configuracion' ? 'active' : ''}`} onClick={() => setActiveTab('configuracion')}>Configuración</button>
                        
                        {userRole === 'admin' && (
                            <button className={`tab admin-tab ${activeTab === 'admin' ? 'active' : ''}`} onClick={() => setActiveTab('admin')}>⚙️ Admin</button>
                        )}
                    </div>

                    <div className="content">
                        {activeTab === 'busqueda' && <BusquedaTab fechas={fechas} plantel={config?.plantel || {}} userRole={userRole} />}
                        {activeTab === 'estadisticas' && <EstadisticasTab calcularEstadisticas={calcularEstadisticas} />}
                        
                        {activeTab === 'configuracion' && (
                            <ConfiguracionTab 
                                userRole={userRole} numEquipos={numEquipos} setNumEquipos={setNumEquipos} equipos={equipos} baseEquipos={baseEquipos} setBaseEquipos={setBaseEquipos}
                                guardarEquiposSeleccionados={guardarEquiposSeleccionados} agregarFecha={agregarFecha} fechas={fechas} zonasConfig={zonasConfig} setZonasConfig={setZonasConfig}
                                config={config} setConfig={setConfig}
                            />
                        )}
                        {activeTab === 'fechas' && (
                            <FechasTab 
                                userRole={userRole} fechas={fechas} procesarHorarios={procesarHorarios} actualizarJugadores={actualizarJugadores} 
                                contarPartidosJugador={contarPartidosJugador} generarPDF={generarPDF} setFechas={setFechas}
                                plantel={config?.plantel || {}}
                            />
                        )}
                        {activeTab === 'resultados' && (
                        <ResultadosTab 
                                userRole={userRole} equipos={equipos} fechas={fechas} resultados={resultados} toggleResultado={toggleResultado} zonasConfig={zonasConfig} 
                                crucesFinales={crucesFinales} playoffAvances={playoffAvances} setPlayoffAvances={setPlayoffAvances} 
                            />
                        )}
                        {activeTab === 'tablas' && (
                            <TablasTab 
                                userRole={userRole} equipos={equipos} fechas={fechas} resultados={resultados} crucesFinales={crucesFinales} 
                                setCrucesFinales={setCrucesFinales} zonasConfig={zonasConfig} setZonasConfig={setZonasConfig} 
                            />
                        )}
                       {activeTab === 'admin' && userRole === 'admin' && (
                            <AdminTab 
                                numEquipos={numEquipos} equipos={equipos} baseEquipos={baseEquipos} fechas={fechas} resultados={resultados} posiciones={posiciones} crucesFinales={crucesFinales} zonasConfig={zonasConfig} playoffAvances={playoffAvances}
                                setNumEquipos={setNumEquipos} setEquipos={setEquipos} setBaseEquipos={setBaseEquipos} setFechas={setFechas} setResultados={setResultados} setPosiciones={setPosiciones} setCrucesFinales={setCrucesFinales} setZonasConfig={setZonasConfig} setPlayoffAvances={setPlayoffAvances}
                                syncStatus={syncStatus} setSyncStatus={setSyncStatus} lastSync={lastSync} setLastSync={setLastSync} guardarEnFirebase={guardarEnFirebase} cargarDesdeFirebase={cargarDesdeFirebase}
                            />
                        )}
                    </div>
                    {/* --- FOOTER / DERECHOS DE AUTOR --- */}
                    <div style={{ 
                        textAlign: 'center', 
                        padding: '20px', 
                        borderTop: '1px solid #e2e8f0', 
                        background: '#f8f9fa', 
                        color: '#64748b', 
                        fontSize: '13px' 
                    }}>
                        &copy; {new Date().getFullYear()} <strong>Desarrollado por Mariano Lumbreras</strong>. Todos los derechos reservados.<br/>
                        <span style={{fontSize: '11px', opacity: 0.8}}>Sistema de Gestión de Torneos Interclubes</span>
                    </div>

                </div>
            );
        }

        // COMPONENTES

        function BusquedaTab({ fechas, plantel, userRole }) {
            const [jugadorSeleccionado, setJugadorSeleccionado] = useState('');
            const [fechaSeleccionada, setFechaSeleccionada] = useState('todas');

            const fechasVisibles = fechas.filter((f, idx) => {
                if (!f) return false;

                                <option value="todas">Todas las fechas</option>
                                {fechas.map((f, idx) => {
                                    if (!f) return null;
                                    const etiqueta = (userRole === 'jugador' && !f.convocada) ? `Fecha ${f.numero} (Oculta)` : `Fecha ${f.numero} vs ${f.rival}`;

                                                if (a.dia !== b.dia) return a.dia === 'sabado' ? -1 : 1;
                                                return a.horario.localeCompare(b.horario);
                                            }).map(partido => {
                                                const companeros = partido.jugadores.filter(j => j !== jugadorSeleccionado);
                                                const esBonus = fecha.partidoBonus === partido.id;
                                                return (
                                                    <div key={partido.id} className={`match-card ${esBonus ? 'bonus' : ''}`}>
                                                        <div className="flex-mobile-col" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px', gap: '10px'}}>
                                                            <div className="match-type" style={{color: '#1e3c72', fontSize: '16px', fontWeight: '700'}}>
                                                                {partido.tipo} {esBonus && <span style={{color: '#f59e0b', fontSize: '14px', marginLeft: '5px'}}>⭐ (Bonus)</span>}

                            {fechasVisibles.every(fecha =>

                        </div>
                    ) : (
                        <div style={{textAlign: 'center', padding: '40px', background: '#f8f9fa', borderRadius: '8px', color: '#64748b', border: '2px dashed #cbd5e1'}}>

                            <p style={{fontSize: '14px'}}>Para ver los días y horarios de tus partidos asignados.</p>
                        </div>
