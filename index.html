        // COMPONENTE FALTANTE: PESTAÑA DE ADMINISTRADOR
        function AdminTab({ 
            numEquipos, equipos, baseEquipos, fechas, resultados, posiciones, crucesFinales, zonasConfig, playoffAvances,
            setNumEquipos, setEquipos, setBaseEquipos, setFechas, setResultados, setPosiciones, setCrucesFinales, setZonasConfig, setPlayoffAvances,
            syncStatus, setSyncStatus, lastSync, setLastSync, guardarEnFirebase, cargarDesdeFirebase
        }) {
            const exportarDatos = () => {
                const datos = localStorage.getItem(ID_PROYECTO + '_datos');
                if (!datos) { alert('No hay datos guardados para exportar.'); return; }
                const blob = new Blob([datos], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url;
                a.download = `goat_backup_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            };

            const importarDatos = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evento) => {
                    try {
                        const contenido = JSON.parse(evento.target.result);
                        if (contenido && (contenido.equipos || contenido.baseEquipos)) {
                            if (confirm('¿Estás seguro de sobreescribir los datos actuales con este respaldo?')) {
                                localStorage.setItem(ID_PROYECTO + '_datos', JSON.stringify(contenido));
                                alert('Datos importados correctamente. La página se recargará.');
                                window.location.reload();
                            }
                        } else { alert('El archivo no parece ser un respaldo válido de la app.'); }
                    } catch (error) { alert('Error al leer el archivo. Asegurate de que sea un archivo JSON válido.'); }
                };
                reader.readAsText(file); e.target.value = ''; 
            };

            return (
                <div>
                    <h2 style={{color: '#1e3c72', marginBottom: '20px'}}>⚙️ Panel de Control Administrador</h2>
                    
                    <div style={{background: '#f8f9fa', padding: '20px', borderRadius: '8px', marginBottom: '30px', border: '1px solid #e2e8f0'}}>
                        <h3 style={{marginBottom: '10px', color: '#0f172a'}}>💾 Respaldo y Nube</h3>
                        <p style={{marginBottom: '20px', color: '#64748b', fontSize: '14px'}}>Sincronizá el estado actual del torneo o exportá copias manuales de seguridad.</p>
                        
                        <div className="flex-mobile-col" style={{display: 'flex', gap: '15px', alignItems: 'center', flexWrap: 'wrap'}}>
                            <button className="btn btn-success btn-responsive" onClick={exportarDatos}>⬇️ Exportar JSON</button>
                            <div style={{position: 'relative'}}>
                                <input type="file" id="importFile" accept=".json" style={{display: 'none'}} onChange={importarDatos} />
                                <button className="btn btn-primary btn-responsive" onClick={() => document.getElementById('importFile').click()} style={{background: '#475569', color: 'white'}}>⬆️ Importar JSON</button>
                            </div>
                            
                            <div style={{width: '2px', height: '30px', background: '#cbd5e1', margin: '0 10px'}} className="hidden-mobile"></div>

                            <button 
                                className="btn btn-primary btn-responsive" style={{background: '#3b82f6'}}
                                onClick={async () => {
                                    try {
                                        setSyncStatus('syncing');
                                        const datos = { numEquipos, equipos, baseEquipos, fechas, resultados, posiciones, crucesFinales, zonasConfig, playoffAvances };
                                        const syncTime = await guardarEnFirebase(datos);
                                        setSyncStatus('synced'); setLastSync(syncTime);
                                        alert('✓ Datos guardados en Firebase exitosamente');
                                    } catch (error) { setSyncStatus('error'); alert('✗ Error al guardar en Firebase'); }
                                }}
                                disabled={syncStatus === 'syncing'}
                            >
                                ☁️ Forzar Guardado Nube
                            </button>
                            <button 
                                className="btn btn-success btn-responsive" style={{background: '#14b8a6'}}
                                onClick={async () => {
                                    try {
                                        setSyncStatus('syncing');
                                        const datosFirebase = await cargarDesdeFirebase();
                                        if (datosFirebase) {
                                            setNumEquipos(datosFirebase.numEquipos || 10); setEquipos(datosFirebase.equipos || []); setBaseEquipos(datosFirebase.baseEquipos || EQUIPOS_POR_DEFECTO); setFechas(datosFirebase.fechas || []); setResultados(datosFirebase.resultados || {}); setPosiciones(datosFirebase.posiciones || {}); setCrucesFinales(datosFirebase.crucesFinales || []); setZonasConfig({ zona1: (datosFirebase.zonasConfig?.zona1 || []), zona2: (datosFirebase.zonasConfig?.zona2 || []) }); setPlayoffAvances(datosFirebase.playoffAvances || {});
                                            setLastSync(datosFirebase.ultimaActualizacion); setSyncStatus('synced'); localStorage.setItem(ID_PROYECTO + '_datos', JSON.stringify(datosFirebase));
                                            alert('✓ Datos cargados desde Firebase exitosamente');
                                        } else { alert('No hay datos guardados en Firebase'); setSyncStatus('local'); }
                                    } catch (error) { setSyncStatus('error'); alert('✗ Error al cargar desde Firebase'); }
                                }}
                                disabled={syncStatus === 'syncing'}
                            >
                                ☁️ Forzar Carga Nube
                            </button>
                        </div>
                        {lastSync && (<p style={{marginTop: '15px', fontSize: '13px', color: '#64748b', fontWeight: 'bold'}}>Última sincronización en nube: {new Date(lastSync).toLocaleString('es-AR')}</p>)}
                    </div>

                    <div style={{background: '#fee2e2', padding: '20px', borderRadius: '8px', border: '1px solid #fca5a5'}}>
                        <h3 style={{marginBottom: '10px', color: '#b91c1c'}}>⚠️ Zona de Peligro</h3>
                        <p style={{marginBottom: '20px', color: '#991b1b', fontSize: '14px'}}>Estas acciones son destructivas y no se pueden deshacer.</p>
                        <button className="btn btn-danger btn-responsive" onClick={() => {
                            if (confirm('¿Estás seguro de que querés borrar el torneo actual? OJO: La base de clubes se mantendrá, pero las fechas y resultados se borrarán de tu navegador (tendrás que pisarlo en la nube manualmente luego).')) {
                                const datosGuardados = localStorage.getItem(ID_PROYECTO + '_datos');
                                let backupBase = EQUIPOS_POR_DEFECTO;
                                if (datosGuardados) backupBase = JSON.parse(datosGuardados).baseEquipos || backupBase;
                                localStorage.removeItem(ID_PROYECTO + '_datos');
                                localStorage.setItem(ID_PROYECTO + '_datos', JSON.stringify({ baseEquipos: backupBase }));
                                window.location.reload();
                            }
                        }}>🗑️ Resetear Torneo Actual</button>
                    </div>
                </div>
            );
        }
        // ── Modal para cargar equipos rivales ──
        function ModalCargarEquipos({ numEquipos, baseEquipos, setBaseEquipos, onGuardar, onClose }) {
            const [rivalesSeleccionados, setRivalesSeleccionados] = useState([...baseEquipos]);
            const [nuevoEquipo, setNuevoEquipo] = useState('');
            const cantidadRivales = numEquipos - 1; // -1 porque el propio equipo ya ocupa 1 slot

            const toggleEquipo = (nombre) => {
                if (rivalesSeleccionados.includes(nombre)) {
                    setRivalesSeleccionados(rivalesSeleccionados.filter(e => e !== nombre));
                } else {
                    if (rivalesSeleccionados.length >= cantidadRivales) {
                        alert(`Solo podés seleccionar ${cantidadRivales} equipos rivales para un torneo de ${numEquipos} equipos.`);
                        return;
                    }
                    setRivalesSeleccionados([...rivalesSeleccionados, nombre]);
                }
            };

            const agregarCustom = () => {
                const nombre = nuevoEquipo.trim();
                if (!nombre) return;
                if (baseEquipos.includes(nombre)) { setNuevoEquipo(''); return; }
                setBaseEquipos([...baseEquipos, nombre]);
                if (rivalesSeleccionados.length < cantidadRivales) setRivalesSeleccionados([...rivalesSeleccionados, nombre]);
                setNuevoEquipo('');
            };

            return (
                <div className="modal" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()} style={{maxWidth:'600px'}}>
                        <div className="modal-header">🏆 Cargar Equipos Rivales</div>
                        <p style={{color:'#64748b', marginBottom:'16px', fontSize:'14px'}}>
                            Seleccioná <strong>{cantidadRivales} equipos</strong> rivales para el torneo de {numEquipos} equipos.<br/>
                            Seleccionados: <strong style={{color: rivalesSeleccionados.length === cantidadRivales ? '#10b981' : '#1e3c72'}}>{rivalesSeleccionados.length} / {cantidadRivales}</strong>
                        </p>

                        <div style={{display:'flex', gap:'8px', marginBottom:'16px'}}>
                            <input type="text" value={nuevoEquipo} onChange={e => setNuevoEquipo(e.target.value)}
                                onKeyPress={e => e.key === 'Enter' && agregarCustom()}
                                placeholder="Agregar equipo nuevo..." style={{flex:1}} />
                            <button className="btn btn-success" style={{margin:0, padding:'10px 16px'}} onClick={agregarCustom}>＋</button>
                        </div>

                        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(180px, 1fr))', gap:'8px', maxHeight:'320px', overflowY:'auto', padding:'4px'}}>
                            {baseEquipos.map(nombre => {
                                const sel = rivalesSeleccionados.includes(nombre);
                                return (
                                    <div key={nombre} onClick={() => toggleEquipo(nombre)} style={{
                                        padding:'10px 14px', borderRadius:'8px', cursor:'pointer',
                                        border: sel ? '2px solid #d4af37' : '2px solid #e2e8f0',
                                        background: sel ? '#fffbef' : '#f8fafc',
                                        fontWeight: sel ? '700' : '400',
                                        color: sel ? '#1a1a1a' : '#475569',
                                        transition:'0.2s',
                                        display:'flex', justifyContent:'space-between', alignItems:'center'
                                    }}>
                                        {nombre}
                                        {sel && <span style={{color:'#d4af37'}}>✓</span>}
                                    </div>
                                );
                            })}
                        </div>

                        <div style={{display:'flex', gap:'10px', marginTop:'20px'}}>
                            <button className="btn btn-primary" style={{flex:2, marginRight:0}}
                                onClick={() => {
                                    if (rivalesSeleccionados.length !== cantidadRivales) {
                                        alert(`Necesitás seleccionar exactamente ${cantidadRivales} equipos.`);
                                        return;
                                    }
                                    onGuardar(rivalesSeleccionados);
                                }}>
                                Guardar Equipos
                            </button>
                            <button className="btn btn-danger" style={{flex:1, marginRight:0}} onClick={onClose}>Cancelar</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ── Modal wizard de carga de plantel por categorías ──
        // Sirve tanto para el setup inicial (paso 3) como para gestión en Configuración.
        // jugadorEditando puede ser:
        //   null                        → abrir en primera cat con espacio
        //   { categoria }               → abrir en esa cat, listo para agregar
        //   { nombre, categoria, ... }  → abrir en esa cat y pre-cargar el jugador para editar
        function ModalCargaPlantel({ plantelActual, jugadorEditando, onGuardar, onClose }) {
            // ¿Es edición de un jugador específico (tiene nombre)?
            const esEdicionJugador = jugadorEditando && jugadorEditando.nombre;

            // Construimos el plantel de trabajo como copia editable
            const [plantelWork, setPlantelWork] = useState(() => {
                const copia = {};
                CATEGORIAS_DISPONIBLES.forEach(c => {
                    copia[c.value] = (plantelActual[c.value] || []).map(j => ({...j}));
                });
                return copia;
            });

            // Índice de la categoría activa
            const [catIdx, setCatIdx] = useState(() => {
                if (jugadorEditando && jugadorEditando.categoria) {
                    const idx = CATEGORIAS_DISPONIBLES.findIndex(c => c.value === jugadorEditando.categoria);
                    return idx >= 0 ? idx : 0;
                }
                // Auto-avanzar a la primera categoría con espacio libre
                const primer = CATEGORIAS_DISPONIBLES.findIndex(c =>
                    (plantelActual[c.value] || []).length < c.max
                );
                return primer >= 0 ? primer : 0;
            });

            // Input del nombre nuevo / edición
            const [nombreInput, setNombreInput] = useState('');
            const [capitanInput, setCapitanInput] = useState(false);
            const [error, setError] = useState('');
            const [editIdx, setEditIdx] = useState(null); // índice del jugador en edición dentro de la cat

            const catActual = CATEGORIAS_DISPONIBLES[catIdx];
            const jugadoresCat = plantelWork[catActual.value] || [];
            const espaciosLibres = catActual.max - jugadoresCat.length;

            // Si venimos a editar un jugador específico, pre-cargar sus datos al montar
            React.useEffect(() => {
                if (esEdicionJugador) {
                    const idx = (plantelWork[jugadorEditando.categoria] || [])
                        .findIndex(j => j.nombre === jugadorEditando.nombre);
                    if (idx >= 0) {
                        setEditIdx(idx);
                        setNombreInput(jugadorEditando.nombre);
                        setCapitanInput(jugadorEditando.capitan || false);
                    }
                }
            }, []);

            const todosLosJugadores = Object.values(plantelWork).flat();

            const agregarOEditar = () => {
                const nom = nombreInput.trim();
                if (!nom) { setError('Escribí el nombre del jugador.'); return; }
                // Check duplicado global (ignorar self si estamos editando)
                const selfNombre = editIdx !== null ? jugadoresCat[editIdx]?.nombre : null;
                const dup = todosLosJugadores.find(j =>
                    j.nombre.toLowerCase() === nom.toLowerCase() && j.nombre !== selfNombre
                );
                if (dup) { setError(`"${nom}" ya está en el plantel.`); return; }

                const nuevaCat = [...jugadoresCat];
                if (editIdx !== null) {
                    nuevaCat[editIdx] = { ...nuevaCat[editIdx], nombre: nom, capitan: capitanInput };
                } else {
                    nuevaCat.push({ nombre: nom, categoria: catActual.value, capitan: capitanInput });
                }
                setPlantelWork({ ...plantelWork, [catActual.value]: nuevaCat });
                setNombreInput('');
                setCapitanInput(false);
                setEditIdx(null);
                setError('');
            };

            const eliminarDeCat = (idx) => {
                const nueva = jugadoresCat.filter((_, i) => i !== idx);
                setPlantelWork({ ...plantelWork, [catActual.value]: nueva });
                if (editIdx === idx) { setEditIdx(null); setNombreInput(''); setCapitanInput(false); }
            };

            const editarJugadorCat = (idx) => {
                setEditIdx(idx);
                setNombreInput(jugadoresCat[idx].nombre);
                setCapitanInput(jugadoresCat[idx].capitan || false);
                setError('');
            };

            const moverJugador = (idx, nuevaCatValue) => {
                const jugador = jugadoresCat[idx];
                const targetMax = MAX_POR_CATEGORIA[nuevaCatValue] || 5;
                if ((plantelWork[nuevaCatValue] || []).length >= targetMax) {
                    setError(`La categoría destino ya está llena.`); return;
                }
                const sinJugador = jugadoresCat.filter((_, i) => i !== idx);
                const conJugador = [...(plantelWork[nuevaCatValue] || []), { ...jugador, categoria: nuevaCatValue }];
                setPlantelWork({ ...plantelWork, [catActual.value]: sinJugador, [nuevaCatValue]: conJugador });
            };

            const guardarTodo = () => {
                // Limpiar categorías vacías y emitir
                const plantelFinal = {};
                CATEGORIAS_DISPONIBLES.forEach(c => {
                    if (plantelWork[c.value] && plantelWork[c.value].length > 0)
                        plantelFinal[c.value] = plantelWork[c.value];
                });
                onGuardar(plantelFinal);
            };

            const totalJugadores = todosLosJugadores.length;
            const totalOriginal = Object.values(plantelActual).flat().length;

            // Colores por tipo de categoría
            const catColor = (val) => val.startsWith('damas') ? '#7c3aed' : '#1d4ed8';
            const catBg    = (val) => val.startsWith('damas') ? '#f5f3ff' : '#eff6ff';

            return (
                <div className="modal" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}
                        style={{maxWidth:'620px', padding:0, overflow:'hidden'}}>

                        {/* ── HEADER ── */}
                        <div style={{
                            background: 'linear-gradient(135deg, #1a1a1a 0%, #2d2416 100%)',
                            padding:'20px 24px', color:'white'
                        }}>
                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                <div>
                                    <h2 style={{margin:0, fontSize:'18px', color:'#d4af37'}}>
                                        {esEdicionJugador ? '✏️ Editar Jugador' : '👥 Gestión del Plantel'}
                                    </h2>
                                    <p style={{margin:'4px 0 0', fontSize:'13px', color:'#c5a572'}}>
                                        {totalJugadores} jugadores en el plantel
                                    </p>
                                </div>
                                <button onClick={onClose} style={{
                                    background:'rgba(255,255,255,0.15)', border:'none', color:'white',
                                    borderRadius:'8px', padding:'6px 12px', cursor:'pointer', fontSize:'16px'
                                }}>✕</button>
                            </div>

                            {/* Pills de categorías */}
                            <div style={{display:'flex', gap:'6px', marginTop:'14px', flexWrap:'wrap'}}>
                                {CATEGORIAS_DISPONIBLES.map((c, i) => {
                                    const count = (plantelWork[c.value] || []).length;
                                    const llena = count >= c.max;
                                    const activa = i === catIdx;
                                    return (
                                        <button key={c.value} onClick={() => { setCatIdx(i); setEditIdx(null); setNombreInput(''); setCapitanInput(false); setError(''); }}
                                            style={{
                                                padding:'5px 10px', borderRadius:'20px', border:'none',
                                                cursor:'pointer', fontSize:'12px', fontWeight:'700',
                                                background: activa ? '#d4af37' : llena ? 'rgba(16,185,129,0.3)' : 'rgba(255,255,255,0.12)',
                                                color: activa ? '#1a1a1a' : llena ? '#6ee7b7' : 'rgba(255,255,255,0.8)',
                                                outline: activa ? 'none' : 'none',
                                                transition:'0.2s',
                                                position:'relative'
                                            }}>
                                            {c.label.replace('Caballeros ','').replace('Damas ','D.')}
                                            <span style={{marginLeft:'5px', opacity:0.8}}>{count}/{c.max}</span>
                                            {llena && <span style={{marginLeft:'3px'}}>✓</span>}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {/* ── BODY ── */}
                        <div style={{padding:'20px 24px', maxHeight:'65vh', overflowY:'auto'}}>

                            {/* Título de la categoría activa */}
                            <div style={{
                                display:'flex', justifyContent:'space-between', alignItems:'center',
                                marginBottom:'14px', padding:'10px 14px',
                                background: catBg(catActual.value), borderRadius:'8px',
                                border:`1px solid ${catColor(catActual.value)}22`
                            }}>
                                <div>
                                    <strong style={{color: catColor(catActual.value), fontSize:'16px'}}>{catActual.label}</strong>
                                    <span style={{fontSize:'13px', color:'#64748b', marginLeft:'10px'}}>
                                        {jugadoresCat.length} / {catActual.max} jugadores
                                    </span>
                                </div>
                                <div style={{
                                    background: espaciosLibres > 0 ? '#dcfce7' : '#fee2e2',
                                    color: espaciosLibres > 0 ? '#166534' : '#991b1b',
                                    padding:'3px 10px', borderRadius:'12px', fontSize:'12px', fontWeight:'700'
                                }}>
                                    {espaciosLibres > 0 ? `${espaciosLibres} libre${espaciosLibres > 1 ? 's' : ''}` : 'COMPLETA'}
                                </div>
                            </div>

                            {/* Lista de jugadores de la categoría */}
                            {jugadoresCat.length > 0 && (
                                <div style={{marginBottom:'16px'}}>
                                    {jugadoresCat.map((j, idx) => (
                                        <div key={idx} style={{
                                            display:'flex', alignItems:'center', gap:'8px',
                                            padding:'9px 12px', borderRadius:'8px', marginBottom:'6px',
                                            background: editIdx === idx ? '#fefce8' : '#f8fafc',
                                            border: editIdx === idx ? '2px solid #d4af37' : '1px solid #e2e8f0',
                                            transition:'0.2s'
                                        }}>
                                            <span style={{flex:1, fontWeight:'600', fontSize:'14px', color:'#1e293b'}}>
                                                {j.nombre}
                                                {j.capitan && <span style={{
                                                    background:'#f59e0b', color:'white', fontSize:'9px',
                                                    padding:'1px 6px', borderRadius:'4px', marginLeft:'6px'
                                                }}>CAP</span>}
                                            </span>
                                            {/* Mover a otra categoría */}
                                            <select
                                                value=""
                                                onChange={e => { if(e.target.value) moverJugador(idx, e.target.value); e.target.value=''; }}
                                                title="Mover a otra categoría"
                                                style={{
                                                    padding:'4px 6px', border:'1px solid #e2e8f0', borderRadius:'6px',
                                                    fontSize:'12px', background:'#f1f5f9', color:'#475569',
                                                    cursor:'pointer', maxWidth:'110px'
                                                }}>
                                                <option value="">↕ Mover</option>
                                                {CATEGORIAS_DISPONIBLES
                                                    .filter(c => c.value !== catActual.value && (plantelWork[c.value]||[]).length < c.max)
                                                    .map(c => <option key={c.value} value={c.value}>{c.label}</option>)
                                                }
                                            </select>
                                            <button onClick={() => editarJugadorCat(idx)} title="Editar" style={{
                                                background:'#e0f2fe', color:'#0369a1', border:'none',
                                                borderRadius:'6px', padding:'5px 8px', cursor:'pointer', fontSize:'13px'
                                            }}>✏️</button>
                                            <button onClick={() => eliminarDeCat(idx)} title="Eliminar" style={{
                                                background:'#fee2e2', color:'#dc2626', border:'none',
                                                borderRadius:'6px', padding:'5px 8px', cursor:'pointer', fontSize:'13px'
                                            }}>🗑️</button>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* Formulario de agregar / editar */}
                            {espaciosLibres > 0 || editIdx !== null ? (
                                <div style={{
                                    background: editIdx !== null ? '#fefce8' : '#f0fdf4',
                                    border: `2px solid ${editIdx !== null ? '#d4af37' : '#86efac'}`,
                                    borderRadius:'10px', padding:'14px'
                                }}>
                                    <p style={{fontSize:'13px', fontWeight:'700', color: editIdx !== null ? '#92400e' : '#166534', marginBottom:'10px'}}>
                                        {editIdx !== null ? `✏️ Editando: ${jugadoresCat[editIdx]?.nombre}` : `➕ Agregar en ${catActual.label}`}
                                    </p>
                                    <div style={{display:'flex', gap:'8px', alignItems:'flex-start', flexWrap:'wrap'}}>
                                        <input
                                            type="text" value={nombreInput}
                                            onChange={e => { setNombreInput(e.target.value); setError(''); }}
                                            onKeyPress={e => e.key === 'Enter' && agregarOEditar()}
                                            placeholder="Nombre del jugador"
                                            autoFocus={editIdx === null}
                                            style={{flex:1, minWidth:'160px', padding:'9px 12px', border:'2px solid #e2e8f0', borderRadius:'8px', fontSize:'14px'}}
                                        />
                                        <label style={{
                                            display:'flex', alignItems:'center', gap:'6px', cursor:'pointer',
                                            fontSize:'13px', fontWeight:'600', color:'#475569',
                                            padding:'9px 12px', background:'white', borderRadius:'8px',
                                            border:'2px solid #e2e8f0', whiteSpace:'nowrap'
                                        }}>
                                            <input type="checkbox" checked={capitanInput}
                                                onChange={e => setCapitanInput(e.target.checked)}
                                                style={{width:'16px', height:'16px'}} />
                                            Cap. ⭐
                                        </label>
                                        <button onClick={agregarOEditar} style={{
                                            padding:'9px 16px', background: editIdx !== null ? '#d4af37' : '#10b981',
                                            color:'white', border:'none', borderRadius:'8px',
                                            fontWeight:'700', cursor:'pointer', fontSize:'14px', whiteSpace:'nowrap'
                                        }}>
                                            {editIdx !== null ? 'Guardar' : '＋ Agregar'}
                                        </button>
                                        {editIdx !== null && (
                                            <button onClick={() => { setEditIdx(null); setNombreInput(''); setCapitanInput(false); setError(''); }}
                                                style={{padding:'9px 12px', background:'#f1f5f9', color:'#475569', border:'none', borderRadius:'8px', cursor:'pointer', fontSize:'13px'}}>
                                                Cancelar
                                            </button>
                                        )}
                                    </div>
                                    {error && (
                                        <p style={{color:'#dc2626', fontSize:'13px', fontWeight:'600', marginTop:'8px', marginBottom:0}}>⚠️ {error}</p>
                                    )}
                                </div>
                            ) : (
                                <div style={{
                                    textAlign:'center', padding:'12px', borderRadius:'8px',
                                    background:'#dcfce7', color:'#166534', fontWeight:'600', fontSize:'14px'
                                }}>
                                    ✅ Categoría completa ({catActual.max}/{catActual.max})
                                </div>
                            )}

                            {/* Navegación entre categorías */}
                            <div style={{display:'flex', justifyContent:'space-between', marginTop:'16px', gap:'8px'}}>
                                <button
                                    disabled={catIdx === 0}
                                    onClick={() => { setCatIdx(catIdx - 1); setEditIdx(null); setNombreInput(''); setCapitanInput(false); setError(''); }}
                                    style={{
                                        flex:1, padding:'9px', borderRadius:'8px', border:'1px solid #e2e8f0',
                                        background: catIdx === 0 ? '#f1f5f9' : 'white',
                                        color: catIdx === 0 ? '#94a3b8' : '#475569',
                                        cursor: catIdx === 0 ? 'default' : 'pointer', fontWeight:'600', fontSize:'13px'
                                    }}>
                                    ← {catIdx > 0 ? CATEGORIAS_DISPONIBLES[catIdx-1].label.replace('Caballeros','Cab.').replace('Damas','Dam.') : ''}
                                </button>
                                <button
                                    disabled={catIdx === CATEGORIAS_DISPONIBLES.length - 1}
                                    onClick={() => { setCatIdx(catIdx + 1); setEditIdx(null); setNombreInput(''); setCapitanInput(false); setError(''); }}
                                    style={{
                                        flex:1, padding:'9px', borderRadius:'8px', border:'1px solid #e2e8f0',
                                        background: catIdx === CATEGORIAS_DISPONIBLES.length - 1 ? '#f1f5f9' : 'white',
                                        color: catIdx === CATEGORIAS_DISPONIBLES.length - 1 ? '#94a3b8' : '#475569',
                                        cursor: catIdx === CATEGORIAS_DISPONIBLES.length - 1 ? 'default' : 'pointer', fontWeight:'600', fontSize:'13px'
                                    }}>
                                    {catIdx < CATEGORIAS_DISPONIBLES.length - 1 ? CATEGORIAS_DISPONIBLES[catIdx+1].label.replace('Caballeros','Cab.').replace('Damas','Dam.') : ''} →
                                </button>
                            </div>
                        </div>

                        {/* ── FOOTER ── */}
                        <div style={{
                            padding:'14px 24px', borderTop:'1px solid #e2e8f0',
                            background:'#f8fafc', display:'flex', justifyContent:'space-between',
                            alignItems:'center', gap:'12px', flexWrap:'wrap'
                        }}>
                            <span style={{fontSize:'13px', color:'#64748b'}}>
                                {totalJugadores} jugador{totalJugadores !== 1 ? 'es' : ''} en el plantel
                                {totalJugadores !== totalOriginal && (
                                    <span style={{color: totalJugadores > totalOriginal ? '#10b981' : '#ef4444', marginLeft:'6px', fontWeight:'700'}}>
                                        ({totalJugadores > totalOriginal ? `+${totalJugadores - totalOriginal}` : totalJugadores - totalOriginal})
                                    </span>
                                )}
                            </span>
                            <div style={{display:'flex', gap:'8px'}}>
                                <button onClick={onClose} style={{
                                    padding:'9px 18px', background:'#f1f5f9', color:'#475569',
                                    border:'none', borderRadius:'8px', cursor:'pointer', fontWeight:'600', fontSize:'14px'
                                }}>Cancelar</button>
                                <button onClick={guardarTodo} style={{
                                    padding:'9px 22px', background:'#1e3c72', color:'white',
                                    border:'none', borderRadius:'8px', cursor:'pointer', fontWeight:'700', fontSize:'14px'
                                }}>💾 Guardar Plantel</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ── Modal para asignar cruces de zona a fechas ──
        // Detecta la zona de mi equipo, genera los 4 cruces vs rivales de esa zona,
        // y permite al usuario asignar cada cruce a una Fecha (1-4).
        function AsignarFechasModal({ zonasConfig, equipos, onClose, onAsignar }) {
            const miEquipoNombre = (equipos.find(e => e.esGoat) || { nombre: 'Mi Equipo' }).nombre;
            const zona1 = (zonasConfig.zona1 || []).filter(Boolean);
            const zona2 = (zonasConfig.zona2 || []).filter(Boolean);

            // Determinar en qué zona está mi equipo
            const miZona = zona1.includes(miEquipoNombre) ? zona1 : zona2.includes(miEquipoNombre) ? zona2 : zona1;
            const otraZona = miZona === zona1 ? zona2 : zona1;
            const miZonaNum = miZona === zona1 ? 1 : 2;

            // Los 4 rivales de mi zona
            const rivalesMiZona = miZona.filter(eq => eq !== miEquipoNombre);

            // Estado: para cada rival, qué fecha le asignamos ('' = sin asignar)
            const [asignaciones, setAsignaciones] = useState(
                Object.fromEntries(rivalesMiZona.map(r => [r, '']))
            );

            const fechasAsignadas = Object.values(asignaciones).filter(v => v !== '');
            const todasAsignadas = rivalesMiZona.every(r => asignaciones[r] !== '');
            const hayDuplicados = new Set(fechasAsignadas).size < fechasAsignadas.length;

            const setAsignacion = (rival, fecha) => {
                setAsignaciones(prev => ({ ...prev, [rival]: fecha }));
            };

            const confirmar = () => {
                if (!todasAsignadas) { alert('Asigná una fecha a cada cruce antes de confirmar.'); return; }
                if (hayDuplicados) { alert('Hay dos cruces asignados a la misma fecha. Cada cruce debe ir a una fecha distinta.'); return; }
                onAsignar(asignaciones); // { 'Rival A': '1', 'Rival B': '2', ... }
            };

            const fechasOpciones = [1, 2, 3, 4];
            // Fechas ya usadas por otros rivales (para deshabilitar opciones duplicadas)
            const fechasEnUso = (rivalActual) =>
                Object.entries(asignaciones)
                    .filter(([r, v]) => r !== rivalActual && v !== '')
                    .map(([, v]) => v);

            return (
                <div className="modal" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()} style={{maxWidth:'520px', padding:0, overflow:'hidden'}}>

                        {/* Header */}
                        <div style={{background:'linear-gradient(135deg,#1a1a1a,#2d2416)', padding:'20px 24px', color:'white'}}>
                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                <div>
                                    <h2 style={{margin:0, color:'#d4af37', fontSize:'18px'}}>📅 Asignar Cruces a Fechas</h2>
                                    <p style={{margin:'4px 0 0', fontSize:'13px', color:'#c5a572'}}>
                                        {miEquipoNombre} · Zona {miZonaNum} · {rivalesMiZona.length} cruces
                                    </p>
                                </div>
                                <button onClick={onClose} style={{background:'rgba(255,255,255,0.15)', border:'none', color:'white', borderRadius:'8px', padding:'6px 12px', cursor:'pointer', fontSize:'16px'}}>✕</button>
                            </div>
                        </div>

                        {/* Body */}
                        <div style={{padding:'20px 24px'}}>
                            <p style={{fontSize:'13px', color:'#64748b', marginBottom:'20px', lineHeight:'1.5'}}>
                                Cada fila es un cruce de <strong>{miEquipoNombre}</strong> contra un rival de su zona.<br/>
                                Asigná a qué <strong>Fecha</strong> corresponde cada partido.
                            </p>

                            {rivalesMiZona.map(rival => {
                                const val = asignaciones[rival];
                                const usadas = fechasEnUso(rival);
                                return (
                                    <div key={rival} style={{
                                        display:'flex', alignItems:'center', gap:'12px',
                                        padding:'12px 14px', marginBottom:'10px',
                                        borderRadius:'10px', border:`2px solid ${val ? '#10b981' : '#e2e8f0'}`,
                                        background: val ? '#f0fdf4' : '#f8fafc',
                                        transition:'0.2s'
                                    }}>
                                        {/* Cruce */}
                                        <div style={{flex:1}}>
                                            <span style={{fontWeight:'700', color:'#1e3c72', fontSize:'14px'}}>{miEquipoNombre}</span>
                                            <span style={{margin:'0 8px', color:'#94a3b8', fontWeight:'700', fontSize:'12px'}}>VS</span>
                                            <span style={{fontWeight:'700', color:'#475569', fontSize:'14px'}}>{rival}</span>
                                        </div>
                                        {/* Selector de fecha */}
                                        <select
                                            value={val}
                                            onChange={e => setAsignacion(rival, e.target.value)}
                                            style={{
                                                padding:'8px 12px', border:`2px solid ${val ? '#10b981' : '#e2e8f0'}`,
                                                borderRadius:'8px', fontSize:'14px', fontWeight:'700',
                                                background: val ? '#dcfce7' : 'white', color: val ? '#166534' : '#475569',
                                                cursor:'pointer', minWidth:'120px'
                                            }}>
                                            <option value="">— Fecha —</option>
                                            {fechasOpciones.map(f => (
                                                <option key={f} value={String(f)}
                                                    disabled={usadas.includes(String(f))}>
                                                    Fecha {f}{usadas.includes(String(f)) ? ' (ocupada)' : ''}
                                                </option>
                                            ))}
                                        </select>
                                        {val && <span style={{color:'#10b981', fontSize:'18px', fontWeight:'700'}}>✓</span>}
                                    </div>
                                );
                            })}

                            {/* Resumen de estado */}
                            <div style={{
                                marginTop:'16px', padding:'10px 14px', borderRadius:'8px',
                                background: todasAsignadas && !hayDuplicados ? '#dcfce7' : '#fff7ed',
                                border:`1px solid ${todasAsignadas && !hayDuplicados ? '#86efac' : '#fed7aa'}`,
                                fontSize:'13px', fontWeight:'600',
                                color: todasAsignadas && !hayDuplicados ? '#166534' : '#92400e'
                            }}>
                                {todasAsignadas && !hayDuplicados
                                    ? '✅ Todo asignado. Podés confirmar.'
                                    : hayDuplicados
                                    ? '⚠️ Dos cruces tienen la misma fecha. Revisá.'
                                    : `⏳ Falta asignar ${rivalesMiZona.length - fechasAsignadas.length} cruce${rivalesMiZona.length - fechasAsignadas.length > 1 ? 's' : ''}.`
                                }
                            </div>
                        </div>

                        {/* Footer */}
                        <div style={{padding:'16px 24px', borderTop:'1px solid #e2e8f0', display:'flex', gap:'10px', justifyContent:'flex-end', background:'#f8fafc'}}>
                            <button onClick={onClose} style={{padding:'9px 20px', background:'#f1f5f9', color:'#475569', border:'none', borderRadius:'8px', cursor:'pointer', fontWeight:'600', fontSize:'14px'}}>Cancelar</button>
                            <button onClick={confirmar}
                                disabled={!todasAsignadas || hayDuplicados}
                                style={{
                                    padding:'9px 24px', border:'none', borderRadius:'8px', cursor: todasAsignadas && !hayDuplicados ? 'pointer' : 'not-allowed',
                                    fontWeight:'700', fontSize:'14px', transition:'0.2s',
                                    background: todasAsignadas && !hayDuplicados ? 'linear-gradient(135deg,#10b981,#059669)' : '#e2e8f0',
                                    color: todasAsignadas && !hayDuplicados ? 'white' : '#94a3b8'
                                }}>
                                ✅ Confirmar Fechas
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function ConfiguracionTab({ userRole, numEquipos, setNumEquipos, equipos, baseEquipos, setBaseEquipos, guardarEquiposSeleccionados, agregarFecha, fechas, zonasConfig, setZonasConfig, config, setConfig }) {
            const miEquipoNombre = (equipos.find(e => e.esGoat) || { nombre: 'Mi Equipo' }).nombre;
            const [showEquiposModal, setShowEquiposModal] = useState(false);
            const [showAsignarFechasModal, setShowAsignarFechasModal] = useState(false);
            const [editandoNumEquipos, setEditandoNumEquipos] = useState(false);
            const [numEquiposTemp, setNumEquiposTemp] = useState(numEquipos);

            // Plantel management
            const [showJugadorModal, setShowJugadorModal] = useState(false);
            const [jugadorEditando, setJugadorEditando] = useState(null); // null = nuevo
            const [guardandoPlantel, setGuardandoPlantel] = useState(false);

            const plantelActual = config?.plantel || {};

            const guardarPlantelEnFirebase = async (nuevoPlantel) => {
                setGuardandoPlantel(true);
                try {
                    const nuevaConfig = { ...config, plantel: nuevoPlantel };
                    await guardarConfigFirebase(nuevaConfig);
                    setConfig(nuevaConfig);
                    localStorage.setItem(`${ID_PROYECTO}_config`, JSON.stringify(nuevaConfig));
                } catch (e) {
                    alert('Error al guardar plantel en Firebase. Verificá tu conexión.');
                } finally {
                    setGuardandoPlantel(false);
                }
            };

            // onGuardar recibe el plantel completo desde ModalCargaPlantel
            const onGuardarPlantel = async (plantelFinal) => {
                await guardarPlantelEnFirebase(plantelFinal);
                setShowJugadorModal(false);
                setJugadorEditando(null);
            };

            const eliminarJugador = async (nombreJugador, categoriaJugador) => {
                if (!confirm(`¿Eliminar a ${nombreJugador}? Esta acción no se puede deshacer.`)) return;
                const nuevoPlantel = JSON.parse(JSON.stringify(plantelActual));
                nuevoPlantel[categoriaJugador] = (nuevoPlantel[categoriaJugador] || []).filter(j => j.nombre !== nombreJugador);
                if (nuevoPlantel[categoriaJugador].length === 0) delete nuevoPlantel[categoriaJugador];
                await guardarPlantelEnFirebase(nuevoPlantel);
            };

            const ascenderJugador = (jugador) => {
                // Open edit modal with next category pre-selected
                const idx = CATEGORIAS_DISPONIBLES.findIndex(c => c.value === jugador.categoria);
                const catSuperior = idx > 0 ? CATEGORIAS_DISPONIBLES[idx - 1].value : jugador.categoria;
                setJugadorEditando({ ...jugador, categoriaOriginal: jugador.categoria });
                setShowJugadorModal(true);
                // We'll preselect catSuperior in the modal by passing it
            };

            const ORDEN_CATS = ['damas_a','damas_b','damas_c','caballeros_2da','caballeros_3ra','caballeros_4ta','caballeros_5ta'];
            const NOMBRES_CATS = { damas_a:'Damas A', damas_b:'Damas B', damas_c:'Damas C', caballeros_2da:'Caballeros 2da', caballeros_3ra:'Caballeros 3ra', caballeros_4ta:'Caballeros 4ta', caballeros_5ta:'Caballeros 5ta' };

            const getCatSuperior = (cat) => {
                const idx = CATEGORIAS_DISPONIBLES.findIndex(c => c.value === cat);
                return idx > 0 ? CATEGORIAS_DISPONIBLES[idx - 1].value : null;
            };

            return (
                <div>
                    <h2 style={{marginBottom: '20px', color: '#1e3c72'}}>Configuración del Torneo</h2>
                    
                    {/* ── SECCIÓN: PLANTEL ── */}
                    {(userRole === 'admin' || userRole === 'capitan') && (
                        <div style={{marginBottom:'30px', padding:'20px', background:'#f8fafc', borderRadius:'12px', border:'1px solid #e2e8f0'}}>
                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'16px', flexWrap:'wrap', gap:'10px'}}>
                                <h3 style={{color:'#1e3c72', margin:0}}>👤 Gestión del Plantel</h3>
                                <button className="btn btn-primary" style={{margin:0}} disabled={guardandoPlantel}
                                    onClick={() => { setJugadorEditando(null); setShowJugadorModal(true); }}>
                                    ✏️ Editar Plantel Completo
                                </button>
                            </div>

                            {Object.keys(plantelActual).length === 0 ? (
                                <div style={{textAlign:'center', padding:'32px', color:'#94a3b8', background:'white', borderRadius:'10px', border:'2px dashed #e2e8f0'}}>
                                    <div style={{fontSize:'36px', marginBottom:'10px'}}>🎾</div>
                                    <p style={{fontWeight:'700', fontSize:'15px', marginBottom:'4px'}}>No hay jugadores cargados.</p>
                                    <p style={{fontSize:'13px'}}>Usá el botón "Editar Plantel Completo" para agregar jugadores por categoría.</p>
                                </div>
                            ) : (
                                <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(240px, 1fr))', gap:'14px'}}>
                                    {ORDEN_CATS.filter(cat => plantelActual[cat] && plantelActual[cat].length > 0).map(cat => (
                                        <div key={cat} style={{background:'white', borderRadius:'10px', border:'1px solid #e2e8f0', overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
                                            {/* Header de categoría */}
                                            <div style={{
                                                padding:'10px 14px',
                                                background: cat.startsWith('damas') ? 'linear-gradient(135deg,#7c3aed,#a855f7)' : 'linear-gradient(135deg,#1e3c72,#2a5298)',
                                                display:'flex', justifyContent:'space-between', alignItems:'center'
                                            }}>
                                                <span style={{color:'white', fontWeight:'700', fontSize:'13px'}}>{NOMBRES_CATS[cat]}</span>
                                                <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                                                    <span style={{background:'rgba(255,255,255,0.25)', color:'white', fontSize:'11px', padding:'2px 8px', borderRadius:'10px', fontWeight:'700'}}>
                                                        {plantelActual[cat].length}/{MAX_POR_CATEGORIA[cat]}
                                                    </span>
                                                    <button onClick={() => { setJugadorEditando({ categoria: cat }); setShowJugadorModal(true); }}
                                                        style={{background:'rgba(255,255,255,0.2)', border:'none', color:'white', borderRadius:'6px', padding:'3px 8px', cursor:'pointer', fontSize:'13px', fontWeight:'700'}}>
                                                        ＋
                                                    </button>
                                                </div>
                                            </div>
                                            {/* Lista de jugadores */}
                                            <div style={{padding:'10px 12px'}}>
                                                {plantelActual[cat].map((jugador, ji) => (
                                                    <div key={jugador.nombre} style={{
                                                        display:'flex', justifyContent:'space-between', alignItems:'center',
                                                        padding:'7px 10px', marginBottom: ji < plantelActual[cat].length-1 ? '6px' : '0',
                                                        background:'#f8fafc', borderRadius:'8px', border:'1px solid #e2e8f0'
                                                    }}>
                                                        <span style={{fontWeight:'600', fontSize:'13px', color:'#1e293b'}}>
                                                            {jugador.nombre}
                                                            {jugador.capitan && <span style={{background:'#f59e0b', color:'white', fontSize:'9px', padding:'1px 5px', borderRadius:'4px', marginLeft:'6px', verticalAlign:'middle'}}>CAP</span>}
                                                        </span>
                                                        <div style={{display:'flex', gap:'4px'}}>
                                                            <button onClick={() => { setJugadorEditando(jugador); setShowJugadorModal(true); }}
                                                                style={{background:'#e0f2fe', color:'#0369a1', border:'none', borderRadius:'5px', padding:'3px 7px', cursor:'pointer', fontSize:'12px'}}>✏️</button>
                                                            <button onClick={() => eliminarJugador(jugador.nombre, cat)}
                                                                style={{background:'#fee2e2', color:'#dc2626', border:'none', borderRadius:'5px', padding:'3px 7px', cursor:'pointer', fontSize:'12px'}}>✕</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            {guardandoPlantel && <div style={{textAlign:'center', color:'#64748b', marginTop:'8px', fontSize:'13px'}}>⏳ Guardando en Firebase...</div>}
                        </div>
                    )}

                    {/* ── SECCIÓN: EQUIPOS DEL TORNEO ── */}
                    {userRole !== 'jugador' && (
                        <div style={{marginBottom:'24px'}}>
                            <h3 style={{color:'#1e3c72', marginBottom:'12px'}}>🏆 Equipos del Torneo</h3>
                            <div style={{display:'flex', alignItems:'center', gap:'12px', marginBottom:'16px', flexWrap:'wrap'}}>
                                <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                                    <label style={{marginBottom:0, fontWeight:'600', color:'#334155'}}>Número de equipos:</label>
                                    {editandoNumEquipos || equipos.length === 0 ? (
                                        <>
                                            <input type="number" value={numEquiposTemp}
                                                onChange={e => setNumEquiposTemp(parseInt(e.target.value) || 2)}
                                                min="2" max="30"
                                                style={{width:'80px', padding:'8px', border:'2px solid #d4af37', borderRadius:'8px', fontSize:'14px', fontWeight:'700'}} />
                                            <button className="btn btn-primary" style={{margin:0, padding:'8px 14px', fontSize:'13px'}}
                                                onClick={() => { setNumEquipos(numEquiposTemp); setEditandoNumEquipos(false); }}>
                                                Aplicar
                                            </button>
                                        </>
                                    ) : (
                                        <>
                                            <strong style={{fontSize:'18px', color:'#1e3c72'}}>{numEquipos}</strong>
                                            {equipos.length === 0 && (
                                                <button className="btn" style={{margin:0, padding:'6px 12px', fontSize:'12px', background:'#f1f5f9', color:'#475569'}}
                                                    onClick={() => { setNumEquiposTemp(numEquipos); setEditandoNumEquipos(true); }}>
                                                    ✏️ Cambiar
                                                </button>
                                            )}
                                        </>
                                    )}
                                </div>
                                {equipos.length === 0 && (
                                    <button className="btn btn-primary" style={{margin:0}}
                                        onClick={() => setShowEquiposModal(true)}>
                                        Cargar Equipos Rivales
                                    </button>
                                )}
                                {equipos.length > 0 && (
                                    <button className="btn" style={{margin:0, background:'#fef3c7', color:'#92400e', border:'1px solid #f59e0b', padding:'8px 14px', fontSize:'13px'}}
                                        onClick={() => { if(confirm('¿Resetear equipos? Se perderá la configuración de zonas.')) { guardarEquiposSeleccionados([]); setEditandoNumEquipos(true); setNumEquiposTemp(numEquipos); } }}>
                                        🔄 Resetear Equipos
                                    </button>
                                )}
                            </div>

                            {equipos.length > 0 && (
                                <div className="team-list">
                                    {equipos.map((eq, idx) => (
                                        <div key={idx} className={`team-card ${eq.esGoat ? 'goat' : ''}`}>
                                            <strong>{eq.nombre}</strong> {eq.esGoat && <span>⭐</span>}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* ── SECCIÓN: ARMADO DE ZONAS ── */}
                    {equipos.length >= numEquipos && (
                        <div style={{marginTop:'24px', padding:'20px', background:'#f8fafc', borderRadius:'12px', border:'1px solid #e2e8f0'}}>
                            <h3 style={{color:'#1e3c72', marginBottom:'16px'}}>📋 Armado de Zonas</h3>

                            {userRole === 'jugador' ? (
                                /* Vista solo lectura para jugador */
                                <div className="grid-2">
                                    {['zona1','zona2'].map((z, zi) => (
                                        <div key={z} style={{background:'white', padding:'16px', borderRadius:'10px', border:'1px solid #e2e8f0'}}>
                                            <h4 style={{marginBottom:'12px', color:'#1e3c72', borderBottom:'2px solid #d4af37', paddingBottom:'6px'}}>Zona {zi+1}</h4>
                                            {(zonasConfig[z]||[]).filter(Boolean).length === 0
                                                ? <p style={{color:'#94a3b8', fontSize:'13px'}}>Sin equipos asignados</p>
                                                : (zonasConfig[z]||[]).filter(Boolean).map((eq,i) => (
                                                    <div key={i} style={{padding:'8px 10px', marginBottom:'4px', borderRadius:'6px', background: eq===miEquipoNombre?'#d1fae5':'#f8fafc', border:'1px solid', borderColor: eq===miEquipoNombre?'#6ee7b7':'#e2e8f0', fontWeight: eq===miEquipoNombre?'700':'500', color: eq===miEquipoNombre?'#065f46':'#334155'}}>
                                                        {eq} {eq===miEquipoNombre&&'⭐'}
                                                    </div>
                                                ))
                                            }
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                /* Vista edición para admin/capitán */
                                (() => {
                                    // Todos los equipos ya asignados en cualquier zona
                                    const zona1 = zonasConfig.zona1 || [];
                                    const zona2 = zonasConfig.zona2 || [];
                                    const asignadosZ1 = new Set(zona1.filter(Boolean));
                                    const asignadosZ2 = new Set(zona2.filter(Boolean));
                                    const todosAsignados = new Set([...asignadosZ1, ...asignadosZ2]);

                                    const opcionesParaZ1 = (slotIdx) => equipos.filter(eq => {
                                        const val = zona1[slotIdx];
                                        if (eq.nombre === val) return true; // el que ya está siempre disponible
                                        return !todosAsignados.has(eq.nombre);
                                    });
                                    const opcionesParaZ2 = (slotIdx) => equipos.filter(eq => {
                                        const val = zona2[slotIdx];
                                        if (eq.nombre === val) return true;
                                        return !todosAsignados.has(eq.nombre);
                                    });

                                    const setZona = (zonaKey, idx, valor) => {
                                        const nuevaZ1 = [...zona1];
                                        const nuevaZ2 = [...zona2];
                                        if (zonaKey === 'zona1') nuevaZ1[idx] = valor;
                                        else nuevaZ2[idx] = valor;

                                        // Auto-completar la otra zona con los equipos restantes
                                        const asignadosNuevos = new Set([...nuevaZ1.filter(Boolean), ...nuevaZ2.filter(Boolean)]);
                                        const restantes = equipos.map(e => e.nombre).filter(n => !asignadosNuevos.has(n));

                                        // Si zona1 ya tiene 5, llenar zona2 con los restantes
                                        if (nuevaZ1.filter(Boolean).length === 5 && nuevaZ2.filter(Boolean).length < 5) {
                                            let ri = 0;
                                            for (let i = 0; i < 5; i++) {
                                                if (!nuevaZ2[i] && ri < restantes.length) {
                                                    nuevaZ2[i] = restantes[ri++];
                                                }
                                            }
                                        }
                                        // Si zona2 ya tiene 5, llenar zona1 con los restantes
                                        if (nuevaZ2.filter(Boolean).length === 5 && nuevaZ1.filter(Boolean).length < 5) {
                                            let ri = 0;
                                            for (let i = 0; i < 5; i++) {
                                                if (!nuevaZ1[i] && ri < restantes.length) {
                                                    nuevaZ1[i] = restantes[ri++];
                                                }
                                            }
                                        }

                                        setZonasConfig({ zona1: nuevaZ1, zona2: nuevaZ2 });
                                    };

                                    const z1completa = zona1.filter(Boolean).length === 5;
                                    const z2completa = zona2.filter(Boolean).length === 5;

                                    return (
                                        <div>
                                            <div className="grid-2" style={{gap:'20px'}}>
                                                {/* ZONA 1 */}
                                                <div style={{background:'white', padding:'16px', borderRadius:'10px', border:`2px solid ${z1completa?'#10b981':'#e2e8f0'}`}}>
                                                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'12px'}}>
                                                        <strong style={{color:'#1e3c72'}}>Zona 1</strong>
                                                        <span style={{fontSize:'12px', fontWeight:'700', padding:'2px 8px', borderRadius:'10px', background: z1completa?'#dcfce7':'#f1f5f9', color: z1completa?'#166534':'#64748b'}}>
                                                            {zona1.filter(Boolean).length}/5 {z1completa&&'✓'}
                                                        </span>
                                                    </div>
                                                    {[0,1,2,3,4].map(idx => (
                                                        <div key={idx} style={{marginBottom:'8px'}}>
                                                            <select value={zona1[idx]||''} onChange={e => setZona('zona1', idx, e.target.value)}
                                                                style={{width:'100%', padding:'8px 10px', border:'1px solid #e2e8f0', borderRadius:'8px', fontSize:'14px', background: zona1[idx]?'#f0fdf4':'white'}}>
                                                                <option value="">— Equipo {idx+1} —</option>
                                                                {opcionesParaZ1(idx).map(eq => (
                                                                    <option key={eq.nombre} value={eq.nombre}>{eq.nombre}{eq.esGoat?' ⭐':''}</option>
                                                                ))}
                                                            </select>
                                                        </div>
                                                    ))}
                                                </div>
                                                {/* ZONA 2 */}
                                                <div style={{background:'white', padding:'16px', borderRadius:'10px', border:`2px solid ${z2completa?'#10b981':'#e2e8f0'}`}}>
                                                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'12px'}}>
                                                        <strong style={{color:'#1e3c72'}}>Zona 2</strong>
                                                        <span style={{fontSize:'12px', fontWeight:'700', padding:'2px 8px', borderRadius:'10px', background: z2completa?'#dcfce7':'#f1f5f9', color: z2completa?'#166534':'#64748b'}}>
                                                            {zona2.filter(Boolean).length}/5 {z2completa&&'✓'}
                                                        </span>
                                                    </div>
                                                    {[0,1,2,3,4].map(idx => (
                                                        <div key={idx} style={{marginBottom:'8px'}}>
                                                            <select value={zona2[idx]||''} onChange={e => setZona('zona2', idx, e.target.value)}
                                                                style={{width:'100%', padding:'8px 10px', border:'1px solid #e2e8f0', borderRadius:'8px', fontSize:'14px', background: zona2[idx]?'#f0fdf4':'white'}}>
                                                                <option value="">— Equipo {idx+1} —</option>
                                                                {opcionesParaZ2(idx).map(eq => (
                                                                    <option key={eq.nombre} value={eq.nombre}>{eq.nombre}{eq.esGoat?' ⭐':''}</option>
                                                                ))}
                                                            </select>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Botón generar cruces — solo cuando ambas zonas completas */}
                                            {z1completa && z2completa && (
                                                <div style={{marginTop:'16px', textAlign:'center'}}>
                                                    <button className="btn btn-success btn-responsive" onClick={() => setShowAsignarFechasModal(true)}>
                                                        🏆 Generar Cruces de Zonas
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })()
                            )}
                        </div>
                    )}

                    {/* ── SECCIÓN: FECHAS (después de zonas completas) ── */}
                    {equipos.length >= numEquipos && userRole !== 'jugador' && (
                        (() => {
                            const zona1 = zonasConfig.zona1 || [];
                            const zona2 = zonasConfig.zona2 || [];
                            const z1ok = zona1.filter(Boolean).length === 5;
                            const z2ok = zona2.filter(Boolean).length === 5;
                            if (!z1ok || !z2ok) return null;

                            return (
                                <div style={{marginTop:'24px', padding:'20px', background:'#f8fafc', borderRadius:'12px', border:'1px solid #e2e8f0'}}>
                                    <h3 style={{color:'#1e3c72', marginBottom:'4px'}}>📅 Fechas Asignadas</h3>
                                    <p style={{color:'#64748b', fontSize:'13px', marginBottom:'16px'}}>Estos son los cruces generados para tu equipo desde el asignador automático.</p>
                                    {[1, 2, 3, 4].map(numFecha => {
                                        const fechaActual = fechas[numFecha-1];

                    {showEquiposModal && (

                    {showJugadorModal && (

       function FechasTab({ userRole, fechas, procesarHorarios, actualizarJugadores, contarPartidosJugador, generarPDF, setFechas, plantel }) {
            const [fechaSeleccionada, setFechaSeleccionada] = useState(0);

            };
            const guardarCategorias = () => { const nuevasFechas = [...fechas]; nuevasFechas[fechaSeleccionada].categoriasHabilitadas = categoriasTemp; nuevasFechas[fechaSeleccionada].jugadoresHabilitados = jugadoresHabilitadosTemp; setFechas(nuevasFechas); setShowCategoriasModal(false); };

                if (existe) setJugadoresHabilitadosTemp(jugadoresHabilitadosTemp.filter(j => !(j.jugador === nombreJugador && j.categoriaDestino === categoriaDestino)));
                else setJugadoresHabilitadosTemp([...jugadoresHabilitadosTemp, { jugador: nombreJugador, categoriaDestino }]);
            };

            const toggleConvocatoria = () => {
                const nuevasFechas = [...fechas];

                return PARTIDOS.filter(p => {

                        if (partidoDelHorario) return true;
                    }
                    if (excluirPartido && p.id === excluirPartido) return false;
                    const partidoAsignado = fecha.partidos.find(fp => fp.id === p.id); return !partidoAsignado.horario;
                });
            };

            const partidosDisponiblesP1 = getPartidosDisponibles(); const partidosDisponiblesP2 = getPartidosDisponibles(parseInt(horarioActual.partido1));

            const agregarHorario = () => {
                if (!horarioActual.partido1 || !horarioActual.partido2) { alert('Debes seleccionar los 2 partidos para este horario'); return; }
                const nuevasFechas = [...fechas]; const fechaIdx = fechaSeleccionada;
                if (editandoHorario) { nuevasFechas[fechaIdx].partidos = nuevasFechas[fechaIdx].partidos.map(p => { if (p.dia === editandoHorario.dia && p.horario === editandoHorario.horario) return { ...p, dia: 'sabado', horario: '', posicion: undefined }; return p; }); }
                const idx1 = nuevasFechas[fechaIdx].partidos.findIndex(p => p.id === parseInt(horarioActual.partido1));
                if (idx1 !== -1) { nuevasFechas[fechaIdx].partidos[idx1].horario = horarioActual.hora; nuevasFechas[fechaIdx].partidos[idx1].dia = horarioActual.dia; nuevasFechas[fechaIdx].partidos[idx1].posicion = 1; }
                const idx2 = nuevasFechas[fechaIdx].partidos.findIndex(p => p.id === parseInt(horarioActual.partido2));
                if (idx2 !== -1) { nuevasFechas[fechaIdx].partidos[idx2].horario = horarioActual.hora; nuevasFechas[fechaIdx].partidos[idx2].dia = horarioActual.dia; nuevasFechas[fechaIdx].partidos[idx2].posicion = 2; }
                setFechas(nuevasFechas); setEditandoHorario(null); setShowHorarioModal(false);
            };

            const eliminarHorario = (dia, hora) => {

                    setFechas(nuevasFechas);

            const editarHorario = (dia, hora) => {
                const partidos = fecha.partidos.filter(p => p.dia === dia && p.horario === hora);
                if (partidos.length === 2) {
                    const p1 = partidos.find(p => p.posicion === 1); const p2 = partidos.find(p => p.posicion === 2);
                    setHorarioActual({ dia: dia, hora: hora, partido1: p1 ? p1.id.toString() : '', partido2: p2 ? p2.id.toString() : '' });
                    setEditandoHorario({ dia, horario: hora }); setShowHorarioModal(true);
                }
            };

            const partidosPorHorario = {};
            if (fecha && fecha.partidos) {
                fecha.partidos.forEach(partido => { if (partido.horario) { const key = `${partido.dia}-${partido.horario}`; if (!partidosPorHorario[key]) partidosPorHorario[key] = { dia: partido.dia, hora: partido.horario, partidos: [] }; partidosPorHorario[key].partidos.push(partido); } });
            }
            const partidosSinAsignar = fecha && fecha.partidos ? PARTIDOS.filter(p => { const partidoAsignado = fecha.partidos.find(fp => fp.id === p.id); return !partidoAsignado.horario; }) : [];
            const categoriasHabilitadasCount = fecha && fecha.jugadoresHabilitados ? fecha.jugadoresHabilitados.length : 0;

            if (!fecha) return null;

            return (
                <div>

                                <button

                                    onClick={() => setFechaSeleccionada(idx)}

                        {userRole !== 'jugador' && (

                                <div style={{ marginBottom: '20px', padding: '15px', background: fecha.convocada ? '#d1fae5' : '#fee2e2', borderRadius: '8px', border: `2px solid ${fecha.convocada ? '#10b981' : '#ef4444'}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '10px' }}>
                                    <div>
                                        <strong>Estado:</strong> {fecha.convocada ? '📢 Pública (Visible para jugadores)' : '🔒 Oculta (Borrador interno)'}
                                    </div>
                                    <button className={`btn ${fecha.convocada ? 'btn-danger' : 'btn-success'} btn-responsive`} onClick={toggleConvocatoria} style={{margin: 0}}>
                                        {fecha.convocada ? 'Ocultar a Jugadores' : 'Publicar Convocatoria'}

                                </div>

                                <div style={{marginBottom: '15px', padding: '12px', background: '#f0f9ff', borderRadius: '8px', border: '1px solid #0ea5e9'}}>
                                    <strong>Partidos sin asignar: {partidosSinAsignar.length} de 26</strong>
                                </div>
                                <div style={{marginBottom: '15px'}}>
                                    <label style={{display: 'flex', alignItems: 'center', gap: '10px', cursor: 'pointer'}}>
                                        <input type="checkbox" checked={categoriasHabilitadasCount > 0} onChange={abrirCategoriasModal} />
